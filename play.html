<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game | PlayZone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="play-header">
    <a href="index.html#games" class="back-btn">← Back to Games</a>
    <span class="play-title" id="play-title">Loading…</span>
  </header>

  <div class="game-frame-wrap" id="game-wrap">
    <div class="game-placeholder">
      <h2 id="placeholder-name">Game</h2>
      <p>Place the game file at <code>games/&lt;game-id&gt;/index.html</code></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const gameId = params.get('game') || '';

    const gameNames = {
      'fish-master':   'Fish Master',
      'gold-miner':    'Gold Miner',
      'qqdzz':         'Ball Battle',
      'sky-strike':    'Sky Fighter',
      'block-shift':   'Block Shift',
      'minesweeper':   'Minesweeper',
      'bubble-pop':    'Bubble Pop',
      'dot-run':       'Dot Run',
      'stack-tower':   'Stack Logs',
      'brick-breaker': 'Brick Breaker',
      'maze-run':      'Maze Chase',
      'frog-hop':      'Frog Crossing',
      'catch-it':      'Catch It',
    };

    const name = gameNames[gameId] || gameId;
    document.title = name + ' | PlayZone';
    document.getElementById('play-title').textContent = name;
    document.getElementById('placeholder-name').textContent = name;

    const gamePath = 'game/' + gameId + '/index.html';
    const wrap = document.getElementById('game-wrap');
    wrap.innerHTML = '<iframe src="' + gamePath + '" allowfullscreen></iframe>';
  </script>

</body>
</html>
