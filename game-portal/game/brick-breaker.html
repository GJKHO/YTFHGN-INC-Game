<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brick Breaker</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0f0f13;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e8e8f0;
    overflow: hidden;
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 600;
    color: #8888a0;
    letter-spacing: 0.5px;
  }
  #hud span { color: #e8e8f0; }
  canvas {
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 60px rgba(124,106,255,0.12);
    cursor: none;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,19,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(6px);
  }
  #overlay h2 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg,#fff 30%,#a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #overlay p { color: #8888a0; font-size: 14px; }
  #overlay button {
    margin-top: 8px;
    padding: 12px 36px;
    background: linear-gradient(135deg,#7c6aff,#a855f7);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #overlay button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,106,255,0.55);
  }
  #overlay.hidden { display: none; }
</style>
</head>
<body>

<div id="hud">
  Score <span id="score">0</span>
  &nbsp;&nbsp;|&nbsp;&nbsp;
  Lives <span id="lives">❤️ ❤️ ❤️</span>
  &nbsp;&nbsp;|&nbsp;&nbsp;
  Level <span id="level">1</span>
</div>
<canvas id="c"></canvas>

<div id="overlay">
  <h2 id="ov-title">Brick Breaker</h2>
  <p id="ov-sub">Move your mouse to control the paddle and break all bricks</p>
  <button id="ov-btn">Start Game</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const overlay   = document.getElementById('overlay');
const ovTitle   = document.getElementById('ov-title');
const ovSub     = document.getElementById('ov-sub');
const ovBtn     = document.getElementById('ov-btn');
const scoreEl   = document.getElementById('score');
const livesEl   = document.getElementById('lives');
const levelEl   = document.getElementById('level');

// ── 尺寸 ──────────────────────────────────────────
const CW = 480, CH = 640;
canvas.width  = CW;
canvas.height = CH;

// ── 配色 ──────────────────────────────────────────
const BRICK_COLORS = [
  ['#f97316','#fb923c'], // 橙
  ['#f43f5e','#fb7185'], // 红
  ['#a855f7','#c084fc'], // 紫
  ['#38bdf8','#7dd3fc'], // 蓝
  ['#06d6a0','#34d399'], // 绿
  ['#ffd166','#ffe599'], // 黄
];

// ── 游戏状态 ──────────────────────────────────────
let state = 'idle'; // idle | playing | dead | win
let score = 0, lives = 3, level = 1;
let rafId;

// ── 挡板 ──────────────────────────────────────────
const PAD = { w:90, h:12, y:CH-40, x:CW/2-45, speed:0 };

// ── 球 ────────────────────────────────────────────
const BALL = { r:8, x:0, y:0, vx:0, vy:0 };

// ── 砖块 ──────────────────────────────────────────
const COLS = 8, ROWS = 6;
const BW = (CW - 48) / COLS, BH = 22, BPAD = 5;
const BTOP = 60;
let bricks = [];

function makeBricks() {
  bricks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const hp = r < 2 ? 1 : r < 4 ? 2 : 3;
      bricks.push({
        x: 24 + c * (BW + BPAD),
        y: BTOP + r * (BH + BPAD),
        w: BW - BPAD,
        h: BH,
        hp,
        maxHp: hp,
        ci: r % BRICK_COLORS.length,
        alive: true,
      });
    }
  }
}

function resetBall() {
  BALL.x  = PAD.x + PAD.w / 2;
  BALL.y  = PAD.y - BALL.r - 2;
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.8;
  const spd   = 4 + level * 0.4;
  BALL.vx = Math.cos(angle) * spd;
  BALL.vy = Math.sin(angle) * spd;
}

function startGame() {
  score = 0; lives = 3; level = 1;
  PAD.x = CW/2 - PAD.w/2;
  makeBricks();
  resetBall();
  updateHud();
  overlay.classList.add('hidden');
  state = 'playing';
  if (rafId) cancelAnimationFrame(rafId);
  loop();
}

function nextLevel() {
  level++;
  makeBricks();
  resetBall();
  updateHud();
}

// ── HUD ───────────────────────────────────────────
function updateHud() {
  scoreEl.textContent = score;
  livesEl.textContent = '❤️ '.repeat(lives).trim() || '💀';
  levelEl.textContent = level;
}

// ── 输入 ──────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx   = (e.clientX - rect.left) * (CW / rect.width);
  PAD.x = Math.max(0, Math.min(CW - PAD.w, mx - PAD.w/2));
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const tx   = (e.touches[0].clientX - rect.left) * (CW / rect.width);
  PAD.x = Math.max(0, Math.min(CW - PAD.w, tx - PAD.w/2));
}, { passive: false });

let keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

function handleKeys() {
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) PAD.x = Math.max(0, PAD.x - 8);
  if (keys['ArrowRight'] || keys['d'] || keys['D']) PAD.x = Math.min(CW - PAD.w, PAD.x + 8);
}

ovBtn.addEventListener('click', startGame);

// ── 碰撞检测 ──────────────────────────────────────
function ballBrickCollision() {
  for (const b of bricks) {
    if (!b.alive) continue;
    const nearX = Math.max(b.x, Math.min(BALL.x, b.x + b.w));
    const nearY = Math.max(b.y, Math.min(BALL.y, b.y + b.h));
    const dx = BALL.x - nearX, dy = BALL.y - nearY;
    if (dx*dx + dy*dy > BALL.r * BALL.r) continue;

    b.hp--;
    if (b.hp <= 0) {
      b.alive = false;
      score += 10 * level;
      updateHud();
    }

    // 反弹方向
    const overlapX = (BALL.vx > 0) ? (BALL.x + BALL.r) - b.x : (b.x + b.w) - (BALL.x - BALL.r);
    const overlapY = (BALL.vy > 0) ? (BALL.y + BALL.r) - b.y : (b.y + b.h) - (BALL.y - BALL.r);
    if (overlapX < overlapY) BALL.vx *= -1; else BALL.vy *= -1;
    break;
  }
}

// ── 粒子 ──────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random() * 2.5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life:1, color });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= 0.03;
  });
}

// ── 更新 ──────────────────────────────────────────
function update() {
  handleKeys();

  BALL.x += BALL.vx;
  BALL.y += BALL.vy;

  // 墙壁
  if (BALL.x - BALL.r < 0)  { BALL.x = BALL.r;      BALL.vx *= -1; }
  if (BALL.x + BALL.r > CW) { BALL.x = CW - BALL.r; BALL.vx *= -1; }
  if (BALL.y - BALL.r < 0)  { BALL.y = BALL.r;       BALL.vy *= -1; }

  // 挡板碰撞
  if (
    BALL.vy > 0 &&
    BALL.y + BALL.r >= PAD.y &&
    BALL.y + BALL.r <= PAD.y + PAD.h + 6 &&
    BALL.x >= PAD.x - 4 &&
    BALL.x <= PAD.x + PAD.w + 4
  ) {
    BALL.y = PAD.y - BALL.r;
    const hit = (BALL.x - (PAD.x + PAD.w/2)) / (PAD.w/2);
    const angle = hit * (Math.PI/3);
    const spd = Math.hypot(BALL.vx, BALL.vy);
    BALL.vx = Math.sin(angle) * spd;
    BALL.vy = -Math.cos(angle) * spd;
  }

  // 落底
  if (BALL.y - BALL.r > CH) {
    lives--;
    updateHud();
    if (lives <= 0) {
      state = 'dead';
      return;
    }
    resetBall();
  }

  ballBrickCollision();
  updateParticles();

  // 过关
  if (bricks.every(b => !b.alive)) {
    nextLevel();
  }
}

// ── 渲染 ──────────────────────────────────────────
function drawBricks() {
  for (const b of bricks) {
    if (!b.alive) continue;
    const [c1, c2] = BRICK_COLORS[b.ci];
    const alpha = 0.4 + 0.6 * (b.hp / b.maxHp);

    // 砖块本体
    ctx.save();
    ctx.globalAlpha = alpha;
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();

    // 高光
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(b.x + 3, b.y + 2, b.w - 6, 5, 3);
    ctx.fill();
    ctx.restore();

    // HP 指示点
    if (b.maxHp > 1) {
      const dotR = 2.5, gap = 7;
      const totalW = b.maxHp * dotR*2 + (b.maxHp-1) * (gap - dotR*2);
      let dx = b.x + b.w/2 - totalW/2;
      for (let i = 0; i < b.maxHp; i++) {
        ctx.beginPath();
        ctx.arc(dx + dotR, b.y + b.h/2, dotR, 0, Math.PI*2);
        ctx.fillStyle = i < b.hp ? '#fff' : 'rgba(255,255,255,0.2)';
        ctx.globalAlpha = 0.9;
        ctx.fill();
        ctx.globalAlpha = 1;
        dx += gap;
      }
    }
  }
}

function drawPaddle() {
  const grad = ctx.createLinearGradient(PAD.x, PAD.y, PAD.x + PAD.w, PAD.y);
  grad.addColorStop(0, '#7c6aff');
  grad.addColorStop(1, '#a855f7');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(PAD.x, PAD.y, PAD.w, PAD.h, PAD.h/2);
  ctx.fill();

  // 高光
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(PAD.x + 6, PAD.y + 2, PAD.w - 12, 4, 2);
  ctx.fill();
}

function drawBall() {
  // 拖影
  ctx.save();
  for (let i = 4; i >= 1; i--) {
    ctx.globalAlpha = 0.06 * i;
    ctx.fillStyle = '#a78bfa';
    ctx.beginPath();
    ctx.arc(BALL.x - BALL.vx * i, BALL.y - BALL.vy * i, BALL.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // 球体
  const grad = ctx.createRadialGradient(BALL.x - 2, BALL.y - 2, 1, BALL.x, BALL.y, BALL.r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(1, '#a78bfa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(BALL.x, BALL.y, BALL.r, 0, Math.PI*2);
  ctx.fill();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBackground() {
  ctx.fillStyle = '#18181f';
  ctx.fillRect(0, 0, CW, CH);

  // 顶部装饰线
  ctx.strokeStyle = 'rgba(124,106,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, BTOP - 10);
  ctx.lineTo(CW, BTOP - 10);
  ctx.stroke();
}

function render() {
  drawBackground();
  drawBricks();
  drawParticles();
  drawPaddle();
  drawBall();
}

// ── 主循环 ────────────────────────────────────────
function loop() {
  if (state !== 'playing') {
    render();
    return;
  }
  update();
  render();

  if (state === 'dead') {
    ovTitle.textContent = 'Game Over';
    ovSub.textContent   = `Final Score: ${score}`;
    ovBtn.textContent   = 'Play Again';
    overlay.classList.remove('hidden');
    return;
  }

  rafId = requestAnimationFrame(loop);
}

// 初始渲染一帧（显示背景）
drawBackground();
</script>
</body>
</html>
