<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dot Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07090f;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      z-index: 2;
    }

    .hud-block { text-align: center; }
    .hud-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .hud-value { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.1; }

    #game-area {
      position: relative;
      width: 100%;
      max-width: 480px;
      flex: 1;
      overflow: hidden;
    }

    canvas { display: block; width: 100%; height: 100%; }

    /* tap zones (mobile) */
    #tap-left, #tap-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      z-index: 5;
    }
    #tap-left  { left: 0; }
    #tap-right { right: 0; }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(7,9,15,0.86);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .screen.hidden { display: none; }

    .screen h2 {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }
    .screen p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      max-width: 270px;
      line-height: 1.7;
    }
    .screen .big-score {
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(135deg, #38bdf8, #06d6a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .hint-row {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .hint-key {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hint-key kbd {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.06);
    }
    .hint-key span { font-size: 11px; color: rgba(255,255,255,0.35); }

    .btn-play {
      padding: 13px 38px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #38bdf8, #06d6a0);
      color: #07090f;
      box-shadow: 0 0 22px rgba(56,189,248,0.4);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(56,189,248,0.6); }
    .btn-play:active { transform: scale(0.97); }

    #float-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="score-val">0</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Speed</div>
    <div class="hud-value" id="speed-val">1</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Best</div>
    <div class="hud-value" id="best-val">0</div>
  </div>
</div>

<div id="game-area">
  <canvas id="canvas"></canvas>
  <div id="tap-left"></div>
  <div id="tap-right"></div>
  <div id="float-layer"></div>

  <!-- Start -->
  <div class="screen" id="screen-start">
    <h2>Dot Run</h2>
    <p>Dodge obstacles, collect orbs,<br>and run as far as you can!</p>
    <div class="hint-row">
      <div class="hint-key"><kbd>◀</kbd><span>Move Left</span></div>
      <div class="hint-key"><kbd>▶</kbd><span>Move Right</span></div>
    </div>
    <p style="font-size:12px;color:rgba(255,255,255,0.3)">Or tap left / right side of the screen</p>
    <button class="btn-play" id="btn-start">▶ Start</button>
  </div>

  <!-- Over -->
  <div class="screen hidden" id="screen-over">
    <h2>Game Over</h2>
    <div class="big-score" id="final-score">0</div>
    <p id="over-msg"></p>
    <button class="btn-play" id="btn-restart">↺ Play Again</button>
  </div>
</div>

<script>
(() => {
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const area    = document.getElementById('game-area');
  const scoreEl = document.getElementById('score-val');
  const speedEl = document.getElementById('speed-val');
  const bestEl  = document.getElementById('best-val');
  const finalEl = document.getElementById('final-score');
  const overMsg = document.getElementById('over-msg');
  const scrStart = document.getElementById('screen-start');
  const scrOver  = document.getElementById('screen-over');
  const floatLayer = document.getElementById('float-layer');

  let W, H, running = false, raf;

  /* ── constants ─────────────────────────────── */
  const LANES      = 3;
  const LANE_W     = 80;       // visual lane width
  const PLAYER_R   = 13;
  const OBJ_R      = 11;
  const OBJ_SPEED0 = 4.5;      // px/frame baseline
  const SPAWN_INT0 = 55;       // frames between spawns

  /* ── state ──────────────────────────────────── */
  let playerLane, playerX, playerY;
  let targetX;
  let moveT = 0;               // 0–1 lane-shift interpolation

  let objects = [];            // {lane, y, type:'orb'|'spike'|'gem', vy}
  let particles = [];
  let floatTexts = [];

  let score, best, frameCount, spawnTimer;
  let speedMult;               // increases over time
  let isDead;
  let deathTimer;

  /* ── track geometry ─────────────────────────── */
  let trackX, trackW;          // centred track region
  function laneCenter(i) {
    return trackX + LANE_W * i + LANE_W / 2;
  }

  /* ── resize ─────────────────────────────────── */
  function resize() {
    W = canvas.width  = area.clientWidth;
    H = canvas.height = area.clientHeight;
    trackW = LANE_W * LANES;
    trackX = (W - trackW) / 2;
    if (running || isDead) {
      playerX  = laneCenter(playerLane);
      targetX  = playerX;
    }
  }

  /* ── object spawning ────────────────────────── */
  function spawnInterval() {
    return Math.max(28, SPAWN_INT0 - Math.floor(frameCount / 300) * 3);
  }

  function spawnObject() {
    const roll = Math.random();
    let type;
    if (roll < 0.55)      type = 'orb';
    else if (roll < 0.80) type = 'spike';
    else if (roll < 0.92) type = 'spike2';   // double-wide spike
    else                  type = 'gem';

    if (type === 'spike2') {
      // block two adjacent lanes
      const startLane = Math.floor(Math.random() * (LANES - 1));
      for (let i = 0; i < 2; i++) {
        objects.push({ lane: startLane + i, y: -OBJ_R * 2, type: 'spike', vy: 0 });
      }
      return;
    }

    const lane = Math.floor(Math.random() * LANES);
    objects.push({ lane, y: -OBJ_R * 2, type, vy: 0 });
  }

  /* ── particles ──────────────────────────────── */
  function burst(x, y, color, n = 10) {
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 / n) * i + Math.random() * 0.5;
      const s = 2 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1,
                       r: 2 + Math.random() * 3, color, life: 1 });
    }
  }

  function floatText(x, y, text, color) {
    // DOM element for crisp text
    const el = document.createElement('div');
    el.textContent = text;
    el.style.cssText = `position:absolute;left:${x}px;top:${y}px;
      transform:translateX(-50%);font-size:16px;font-weight:800;
      color:${color};text-shadow:0 0 8px ${color};pointer-events:none;
      transition:opacity 0.8s,transform 0.8s;`;
    floatLayer.appendChild(el);
    requestAnimationFrame(() => {
      el.style.transform = 'translateX(-50%) translateY(-36px)';
      el.style.opacity   = '0';
    });
    setTimeout(() => el.remove(), 900);
  }

  /* ── player movement ────────────────────────── */
  function moveLane(dir) {
    if (!running || isDead) return;
    const next = playerLane + dir;
    if (next < 0 || next >= LANES) return;
    playerLane = next;
    targetX    = laneCenter(next);
    moveT      = 0;
  }

  /* ── trail ──────────────────────────────────── */
  let trail = [];

  /* ── update ─────────────────────────────────── */
  function update() {
    frameCount++;
    spawnTimer++;

    const spd = OBJ_SPEED0 * speedMult;

    if (spawnTimer >= spawnInterval()) {
      spawnObject();
      spawnTimer = 0;
    }

    // Speed ramp
    speedMult = 1 + frameCount / 1200;
    speedEl.textContent = speedMult.toFixed(1);

    // Score ticks
    if (frameCount % 6 === 0) {
      score++;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('dotRunBest', best); }
    }

    // Smooth lane shift
    if (moveT < 1) {
      moveT = Math.min(1, moveT + 0.18);
      playerX = lerp(playerX, targetX, moveT);
    } else {
      playerX = targetX;
    }

    // Trail
    trail.push({ x: playerX, y: playerY });
    if (trail.length > 22) trail.shift();

    // Objects
    for (let i = objects.length - 1; i >= 0; i--) {
      const o = objects[i];
      o.y += spd;

      // Out of screen
      if (o.y - OBJ_R > H) { objects.splice(i, 1); continue; }

      // Collision
      const ox = laneCenter(o.lane);
      const dy = Math.abs(playerY - o.y);
      const dx = Math.abs(playerX - ox);
      const hitR = PLAYER_R + OBJ_R - 4;
      if (dx < hitR && dy < hitR) {
        if (o.type === 'orb') {
          score += 10;
          scoreEl.textContent = score;
          if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('dotRunBest', best); }
          burst(ox, o.y, '#ffd166', 8);
          floatText(ox, o.y, '+10', '#ffd166');
          objects.splice(i, 1);
        } else if (o.type === 'gem') {
          score += 30;
          scoreEl.textContent = score;
          if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('dotRunBest', best); }
          burst(ox, o.y, '#f472b6', 14);
          floatText(ox, o.y, '+30 💎', '#f472b6');
          objects.splice(i, 1);
        } else {
          // spike – die
          triggerDeath(ox, o.y);
          return;
        }
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15;
      p.life -= 0.04;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function triggerDeath(ox, oy) {
    isDead   = true;
    running  = false;
    burst(playerX, playerY, '#38bdf8', 16);
    burst(ox, oy, '#ef4444', 16);
    deathTimer = 60;
  }

  /* ── draw ───────────────────────────────────── */
  function drawTrack() {
    // Side fade
    const fadeW = 32;
    const leftG  = ctx.createLinearGradient(trackX - fadeW, 0, trackX, 0);
    leftG.addColorStop(0, 'rgba(7,9,15,1)');
    leftG.addColorStop(1, 'rgba(7,9,15,0)');
    const rightG = ctx.createLinearGradient(trackX + trackW, 0, trackX + trackW + fadeW, 0);
    rightG.addColorStop(0, 'rgba(7,9,15,0)');
    rightG.addColorStop(1, 'rgba(7,9,15,1)');

    // Track background
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(trackX, 0, trackW, H);

    // Lane dividers – dashed scrolling lines
    const dashLen = 22, gapLen = 14, period = dashLen + gapLen;
    const offset  = (frameCount * OBJ_SPEED0 * speedMult * 0.5) % period;
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    for (let i = 1; i < LANES; i++) {
      const lx = trackX + LANE_W * i;
      ctx.setLineDash([dashLen, gapLen]);
      ctx.lineDashOffset = -offset;
      ctx.beginPath();
      ctx.moveTo(lx, 0);
      ctx.lineTo(lx, H);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // Track borders
    ctx.strokeStyle = 'rgba(56,189,248,0.25)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(trackX, 0); ctx.lineTo(trackX, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(trackX + trackW, 0); ctx.lineTo(trackX + trackW, H); ctx.stroke();

    // Edge fades
    ctx.fillStyle = leftG;
    ctx.fillRect(trackX - fadeW, 0, fadeW, H);
    ctx.fillStyle = rightG;
    ctx.fillRect(trackX + trackW, 0, fadeW, H);
  }

  function drawObjects() {
    objects.forEach(o => {
      const ox = laneCenter(o.lane);
      if (o.type === 'orb') {
        const g = ctx.createRadialGradient(ox, o.y, 1, ox, o.y, OBJ_R * 1.6);
        g.addColorStop(0, '#ffd166cc');
        g.addColorStop(1, '#ffd16600');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(ox, o.y, OBJ_R * 1.6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffd166'; ctx.beginPath(); ctx.arc(ox, o.y, OBJ_R, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath(); ctx.ellipse(ox - OBJ_R*0.25, o.y - OBJ_R*0.25, OBJ_R*0.3, OBJ_R*0.18, -0.4, 0, Math.PI*2); ctx.fill();
      } else if (o.type === 'gem') {
        ctx.save();
        ctx.translate(ox, o.y);
        ctx.rotate(Math.PI / 4 + frameCount * 0.03);
        const g = ctx.createRadialGradient(0, 0, 1, 0, 0, OBJ_R * 1.5);
        g.addColorStop(0, '#f472b6cc'); g.addColorStop(1, '#f472b600');
        ctx.fillStyle = g; ctx.fillRect(-OBJ_R*1.5, -OBJ_R*1.5, OBJ_R*3, OBJ_R*3);
        ctx.fillStyle = '#f472b6';
        ctx.fillRect(-OBJ_R*0.8, -OBJ_R*0.8, OBJ_R*1.6, OBJ_R*1.6);
        ctx.restore();
      } else {
        // spike
        ctx.save();
        ctx.translate(ox, o.y);
        // glow
        const g = ctx.createRadialGradient(0, 0, 1, 0, 0, OBJ_R * 2);
        g.addColorStop(0, '#ef444488'); g.addColorStop(1, '#ef444400');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, OBJ_R*2, 0, Math.PI*2); ctx.fill();
        // spike shape
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        for (let s = 0; s < 6; s++) {
          const a = (Math.PI * 2 / 6) * s - Math.PI / 2;
          const r = s % 2 === 0 ? OBJ_R : OBJ_R * 0.45;
          s === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                  : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    });
  }

  function drawPlayer() {
    if (isDead) return;
    // Trail
    trail.forEach((pt, i) => {
      const t = i / trail.length;
      ctx.save();
      ctx.globalAlpha = t * 0.45;
      ctx.fillStyle = '#38bdf8';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, PLAYER_R * (0.3 + t * 0.5), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    // Glow
    const g = ctx.createRadialGradient(playerX, playerY, 1, playerX, playerY, PLAYER_R * 2.2);
    g.addColorStop(0, '#38bdf8aa');
    g.addColorStop(1, '#38bdf800');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(playerX, playerY, PLAYER_R * 2.2, 0, Math.PI*2);
    ctx.fill();

    // Body
    const bodyG = ctx.createRadialGradient(playerX - PLAYER_R*0.3, playerY - PLAYER_R*0.3, 1, playerX, playerY, PLAYER_R);
    bodyG.addColorStop(0, '#7dd3fc');
    bodyG.addColorStop(1, '#0284c7');
    ctx.fillStyle = bodyG;
    ctx.beginPath();
    ctx.arc(playerX, playerY, PLAYER_R, 0, Math.PI*2);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(playerX - PLAYER_R*0.28, playerY - PLAYER_R*0.28, PLAYER_R*0.28, PLAYER_R*0.16, -0.4, 0, Math.PI*2);
    ctx.fill();
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawTrack();
    drawObjects();
    drawPlayer();
    drawParticles();
  }

  /* ── game loop ──────────────────────────────── */
  function loop() {
    if (isDead) {
      draw();
      drawParticles();
      deathTimer--;
      // Advance particles even on death
      for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15;
        p.life -= 0.025;
        if (p.life <= 0) particles.splice(i, 1);
      }
      raf = requestAnimationFrame(loop);
      if (deathTimer <= 0) showGameOver();
      return;
    }
    if (!running) return;
    update();
    draw();
    raf = requestAnimationFrame(loop);
  }

  /* ── screens ────────────────────────────────── */
  function showGameOver() {
    cancelAnimationFrame(raf);
    finalEl.textContent = score;
    overMsg.textContent = score >= best ? '🏆 New best score!' : `Best is ${best} — keep running!`;
    scrOver.classList.remove('hidden');
  }

  function startGame() {
    objects = []; particles = []; trail = [];
    score = 0; frameCount = 0; spawnTimer = 0;
    speedMult = 1; isDead = false; deathTimer = 0;
    moveT = 1;
    scoreEl.textContent = '0';
    speedEl.textContent = '1.0';

    playerLane = 1;
    playerX    = laneCenter(1);
    targetX    = playerX;
    playerY    = H * 0.78;

    scrStart.classList.add('hidden');
    scrOver.classList.add('hidden');
    running = true;
    cancelAnimationFrame(raf);
    loop();
  }

  /* ── input ──────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft'  || e.key === 'a') moveLane(-1);
    if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
  });

  document.getElementById('tap-left').addEventListener('touchstart',  e => { e.preventDefault(); moveLane(-1); }, { passive: false });
  document.getElementById('tap-right').addEventListener('touchstart', e => { e.preventDefault(); moveLane(1);  }, { passive: false });
  document.getElementById('tap-left').addEventListener('click',  () => moveLane(-1));
  document.getElementById('tap-right').addEventListener('click', () => moveLane(1));

  document.getElementById('btn-start').addEventListener('click',   startGame);
  document.getElementById('btn-restart').addEventListener('click', startGame);

  /* ── helpers ────────────────────────────────── */
  function lerp(a, b, t) { return a + (b - a) * t; }

  /* ── init ───────────────────────────────────── */
  best = parseInt(localStorage.getItem('dotRunBest') || '0');
  bestEl.textContent = best;

  window.addEventListener('resize', resize);
  resize();

  // idle background loop
  (function idle() {
    if (running || isDead) return;
    ctx.clearRect(0, 0, W, H);
    drawTrack();
    requestAnimationFrame(idle);
  })();
})();
</script>
</body>
</html>
