<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frog Crossing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a2e1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #wrapper {
      position: relative;
      width: 480px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #0d1f0d;
      border-radius: 8px 8px 0 0;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
    }

    #hud span { color: #06d6a0; }

    canvas {
      display: block;
      border-radius: 0 0 8px 8px;
    }

    #overlay {
      position: absolute;
      inset: 36px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      border-radius: 0 0 8px 8px;
      color: #fff;
      text-align: center;
      z-index: 10;
    }

    #overlay h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #06d6a0;
    }

    #overlay p { font-size: 14px; color: #ccc; margin-bottom: 6px; }

    #overlay .big { font-size: 48px; margin: 6px 0; color: #ffd166; }

    #btn {
      margin-top: 18px;
      padding: 10px 30px;
      font-size: 16px;
      font-weight: bold;
      background: #06d6a0;
      color: #0a2820;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
    }

    #btn:hover { background: #04b888; }
  </style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
  </div>
  <canvas id="c" width="480" height="520"></canvas>
  <div id="overlay">
    <h2>Frog Crossing</h2>
    <p>Use arrow keys or WASD to move</p>
    <p>Cross the road and river to score!</p>
    <button id="btn">▶ Start</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- Layout constants ----
const ROWS      = 13;   // number of tile rows
const CELL      = 40;   // px per cell
const COLS      = W / CELL; // 12

// Row types (bottom → top, index 0 = bottom row)
// 0: safe zone (start), 12: safe zone (goal)
// 1-4: road, 5: median, 6-10: river, 11: goal bank

const ROW_TYPES = [
  'safe',   // 0 - start
  'road',   // 1
  'road',   // 2
  'road',   // 3
  'road',   // 4
  'safe',   // 5 - median
  'water',  // 6
  'water',  // 7
  'water',  // 8
  'water',  // 9
  'water',  // 10
  'safe',   // 11 - goal bank
  'goal',   // 12
];

// Colors per row type
const ROW_COLORS = {
  safe  : '#2d5a27',
  road  : '#3a3a3a',
  water : '#1a4a6b',
  goal  : '#1a6b3a',
};

// ---- Obstacle lanes ----
// Each lane: { row, obstacles:[], speed, size, gap, color }
const lanes = [];

function makeLanes() {
  lanes.length = 0;

  // Road lanes (rows 1-4)
  const carColors = ['#e63946','#f4a261','#ffd166','#a8dadc','#457b9d'];
  const roadRows = [1, 2, 3, 4];
  roadRows.forEach((r, i) => {
    const dir   = i % 2 === 0 ? 1 : -1;
    const speed = 1.0 + i * 0.4;          // slower: 1.0 / 1.4 / 1.8 / 2.2
    const gap   = 180 + Math.random() * 80; // wider gap: 180-260px
    const color = carColors[i % carColors.length];
    const lane  = { row: r, obstacles: [], speed: speed * dir, size: 60, height: 28, color, type: 'car' };
    let x = Math.random() * W;
    for (let k = 0; k < 3; k++) {         // 3 cars instead of 4
      lane.obstacles.push({ x });
      x += gap + Math.random() * 60;
    }
    lanes.push(lane);
  });

  // Water lanes (rows 6-10)
  const logColors = ['#6b4c2a','#7a5c36','#8b6c46','#5a3d1a','#7d5f3e'];
  const waterRows = [6, 7, 8, 9, 10];
  waterRows.forEach((r, i) => {
    const dir   = i % 2 === 0 ? 1 : -1;
    const speed = 0.9 + i * 0.35;         // slightly slower logs
    const gap   = 60 + Math.random() * 40; // shorter gap between logs (logs are safe platforms)
    const color = logColors[i % logColors.length];
    const w     = 90 + Math.floor(Math.random() * 40); // wider logs: 90-130px
    const lane  = { row: r, obstacles: [], speed: speed * dir, size: w, height: 28, color, type: 'log' };
    let x = Math.random() * W;
    for (let k = 0; k < 3; k++) {
      lane.obstacles.push({ x });
      x += w + gap + Math.random() * 30;
    }
    lanes.push(lane);
  });
}

// ---- Frog ----
const FROG_SIZE = 30;
let frog, lives, score, best, state, rideLog;
// state: 'start' | 'play' | 'dead' | 'win' | 'gameover'

function rowY(r) { return H - (r + 1) * CELL; }   // canvas y for row r
function rowCenterY(r) { return rowY(r) + CELL / 2; }

function resetFrog() {
  frog = {
    x    : W / 2,
    y    : rowCenterY(0),
    row  : 0,
    col  : Math.floor(COLS / 2),
    moving: false,
  };
  rideLog = null;
}

function initGame() {
  lives  = 3;
  score  = 0;
  state  = 'play';
  best   = parseInt(localStorage.getItem('frogBest') || '0');
  makeLanes();
  resetFrog();
  updateHUD();
  hideOverlay();
}

// ---- HUD ----
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
  document.getElementById('lives').textContent = lives;
}

// ---- Overlay ----
function showOverlay(title, sub, bigText) {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h2>${title}</h2>
    ${sub ? `<p>${sub}</p>` : ''}
    ${bigText ? `<div class="big">${bigText}</div>` : ''}
    <button id="btn">${state === 'gameover' ? '▶ Play Again' : '▶ Continue'}</button>
  `;
  document.getElementById('btn').addEventListener('click', () => {
    if (state === 'gameover') initGame();
    else { state = 'play'; resetFrog(); hideOverlay(); }
  });
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ---- Input ----
const MOVE = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
               w:'up', s:'down', a:'left', d:'right',
               W:'up', S:'down', A:'left', D:'right' };

document.addEventListener('keydown', e => {
  if (state !== 'play') return;
  const dir = MOVE[e.key];
  if (!dir) return;
  e.preventDefault();
  moveFrog(dir);
});

// Touch support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart || state !== 'play') return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) moveFrog(dx > 0 ? 'right' : 'left');
  else moveFrog(dy > 0 ? 'down' : 'up');
  touchStart = null;
}, { passive: true });

function moveFrog(dir) {
  const prev = frog.row;
  if (dir === 'up'    && frog.row < ROWS - 1) { frog.row++; frog.y = rowCenterY(frog.row); }
  if (dir === 'down'  && frog.row > 0)         { frog.row--; frog.y = rowCenterY(frog.row); }
  if (dir === 'left'  && frog.x > CELL / 2)   frog.x -= CELL;
  if (dir === 'right' && frog.x < W - CELL/2) frog.x += CELL;

  if (frog.row > prev) { score += 10; updateHUD(); }
  rideLog = null; // detach from log when player moves vertically

  // Reached goal row
  if (frog.row === ROWS - 1) {
    score += 50;
    if (score > best) { best = score; localStorage.setItem('frogBest', best); }
    updateHUD();
    state = 'win';
    showOverlay('🎉 You Made It!', 'Keep going for more points!', score);
  }
}

// ---- Collision helpers ----
function getLane(row) { return lanes.find(l => l.row === row); }

function checkDeath() {
  const type = ROW_TYPES[frog.row];

  if (type === 'road') {
    const lane = getLane(frog.row);
    if (!lane) return;
    for (const ob of lane.obstacles) {
      if (rectsOverlap(frog.x, frog.y, FROG_SIZE, FROG_SIZE * 0.7,
                       ob.x, rowCenterY(lane.row), lane.size, lane.height)) {
        die(); return;
      }
    }
  }

  if (type === 'water') {
    const lane = getLane(frog.row);
    if (!lane) { die(); return; }
    // Must be on a log
    let onLog = false;
    for (const ob of lane.obstacles) {
      if (rectsOverlap(frog.x, frog.y, FROG_SIZE * 0.7, FROG_SIZE * 0.7,
                       ob.x, rowCenterY(lane.row), lane.size, lane.height)) {
        onLog = true;
        rideLog = { lane, ob };
        break;
      }
    }
    if (!onLog) { die(); return; }
  }
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  // centre-based
  return Math.abs(ax - bx) < (aw + bw) / 2 - 4 &&
         Math.abs(ay - by) < (ah + bh) / 2 - 4;
}

function die() {
  lives--;
  updateHUD();
  if (lives <= 0) {
    state = 'gameover';
    if (score > best) { best = score; localStorage.setItem('frogBest', best); }
    updateHUD();
    showOverlay('Game Over', 'Better luck next time!', score);
  } else {
    state = 'dead';
    showOverlay('Oops!', `${lives} ${lives === 1 ? 'life' : 'lives'} left`, '💀');
  }
}

// ---- Update ----
function update() {
  if (state !== 'play') return;

  for (const lane of lanes) {
    for (const ob of lane.obstacles) {
      ob.x += lane.speed;
      if (lane.speed > 0 && ob.x > W + lane.size / 2)  ob.x = -lane.size / 2;
      if (lane.speed < 0 && ob.x < -lane.size / 2)     ob.x = W + lane.size / 2;
    }
    // Carry frog on log
    if (rideLog && rideLog.lane === lane) {
      frog.x += lane.speed;
    }
  }

  // Wall-clamp frog
  frog.x = Math.max(FROG_SIZE / 2, Math.min(W - FROG_SIZE / 2, frog.x));
  // Fell off river edge
  if (ROW_TYPES[frog.row] === 'water') {
    if (frog.x <= 0 || frog.x >= W) { die(); return; }
  }

  checkDeath();
}

// ---- Draw ----
function drawRow(r) {
  const type  = ROW_TYPES[r];
  const color = ROW_COLORS[type] || '#2d5a27';
  ctx.fillStyle = color;
  ctx.fillRect(0, rowY(r), W, CELL);

  // Road lines
  if (type === 'road') {
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.setLineDash([10, 8]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, rowY(r) + CELL / 2);
    ctx.lineTo(W, rowY(r) + CELL / 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Water ripples
  if (type === 'water') {
    ctx.strokeStyle = 'rgba(56,189,248,0.18)';
    ctx.lineWidth   = 1.5;
    for (let i = 0; i < 3; i++) {
      const wy = rowY(r) + 8 + i * 10;
      ctx.beginPath();
      ctx.moveTo(0, wy);
      ctx.bezierCurveTo(W * 0.25, wy - 4, W * 0.75, wy + 4, W, wy);
      ctx.stroke();
    }
  }

  // Goal stripe
  if (type === 'goal') {
    ctx.fillStyle = '#ffd166';
    for (let x = 0; x < W; x += 30) {
      ctx.fillRect(x, rowY(r), 15, CELL);
    }
    ctx.fillStyle = '#1a6b3a';
    for (let x = 15; x < W; x += 30) {
      ctx.fillRect(x, rowY(r), 15, CELL);
    }
  }
}

function drawObstacles() {
  for (const lane of lanes) {
    const y = rowCenterY(lane.row);
    for (const ob of lane.obstacles) {
      if (lane.type === 'car') {
        drawCar(ob.x, y, lane.size, lane.height, lane.color, lane.speed > 0);
      } else {
        drawLog(ob.x, y, lane.size, lane.height, lane.color);
      }
    }
  }
}

function drawCar(cx, cy, w, h, color, facingRight) {
  ctx.save();
  ctx.translate(cx, cy);
  if (!facingRight) ctx.scale(-1, 1);

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, 6);
  ctx.fill();

  // Roof
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(-w/4, -h/2 - 8, w/2, 10, 3);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#1a1a1a';
  [[-w/3, h/2 - 2], [w/3, h/2 - 2]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.ellipse(wx, wy, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // Headlight
  ctx.fillStyle = '#fffde0';
  ctx.beginPath();
  ctx.ellipse(w/2 - 4, 0, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawLog(cx, cy, w, h, color) {
  ctx.save();
  ctx.translate(cx, cy);

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, 8);
  ctx.fill();

  // Wood grain
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth   = 1.5;
  for (let i = -w/2 + 12; i < w/2 - 4; i += 14) {
    ctx.beginPath();
    ctx.moveTo(i, -h/2 + 2);
    ctx.lineTo(i, h/2 - 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawFrog() {
  const x = frog.x, y = frog.y;
  const s = FROG_SIZE;

  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#06d6a0';
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.55, s * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  [[-s*0.3, -s*0.28], [s*0.3, -s*0.28]].forEach(([ex, ey]) => {
    ctx.beginPath();
    ctx.arc(ex, ey, s * 0.14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a2820';
    ctx.beginPath();
    ctx.arc(ex + 1, ey, s * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
  });

  // Front legs
  ctx.strokeStyle = '#04b888';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  [[-s*0.5, s*0.1], [s*0.5, s*0.1]].forEach(([lx, ly]) => {
    ctx.beginPath();
    ctx.moveTo(lx * 0.4, s * 0.2);
    ctx.lineTo(lx, ly + s*0.15);
    ctx.stroke();
  });

  // Back legs
  [[-s*0.5, s*0.32], [s*0.5, s*0.32]].forEach(([lx, ly]) => {
    ctx.beginPath();
    ctx.moveTo(lx * 0.35, s * 0.32);
    ctx.lineTo(lx, ly);
    ctx.stroke();
  });

  ctx.restore();
}

// ---- Main loop ----
function draw() {
  ctx.clearRect(0, 0, W, H);
  for (let r = 0; r < ROWS; r++) drawRow(r);
  drawObstacles();
  if (state !== 'start') drawFrog();
}

let last = 0;
function loop(ts) {
  const dt = ts - last; last = ts;
  if (dt < 100) update(); // skip large gaps (tab unfocused)
  draw();
  requestAnimationFrame(loop);
}

// Init display
makeLanes();
resetFrog();
draw();
document.getElementById('btn').addEventListener('click', initGame);
requestAnimationFrame(loop);
</script>
</body>
</html>
