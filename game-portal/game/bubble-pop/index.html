<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bubble Pop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .hud-block { text-align: center; }
    .hud-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .hud-value { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.1; }

    #lives-display { display: flex; gap: 4px; align-items: center; justify-content: center; }
    .heart { font-size: 18px; }

    #game-area {
      position: relative;
      width: 100%;
      max-width: 480px;
      flex: 1;
      overflow: hidden;
      cursor: crosshair;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Overlay screens */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(10,14,26,0.88);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .screen.hidden { display: none; }

    .screen h2 {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }
    .screen p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }
    .screen .score-line {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #f472b6, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-play {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #f472b6, #38bdf8);
      color: #fff;
      box-shadow: 0 0 24px rgba(244,114,182,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 32px rgba(244,114,182,0.6); }
    .btn-play:active { transform: scale(0.97); }

    #combo-toast {
      position: absolute;
      pointer-events: none;
      font-size: 20px;
      font-weight: 800;
      color: #ffd166;
      text-shadow: 0 0 12px #ffd16688;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="score-val">0</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Level</div>
    <div class="hud-value" id="level-val">1</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Lives</div>
    <div id="lives-display"></div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Best</div>
    <div class="hud-value" id="best-val">0</div>
  </div>
</div>

<div id="game-area">
  <canvas id="canvas"></canvas>
  <div id="combo-toast"></div>

  <!-- Start screen -->
  <div class="screen" id="screen-start">
    <h2>Bubble Pop</h2>
    <p>Tap bubbles before they float away!<br>Miss 3 and it's game over.</p>
    <button class="btn-play" id="btn-start">▶ Start Game</button>
  </div>

  <!-- Game over screen -->
  <div class="screen hidden" id="screen-over">
    <h2>Game Over</h2>
    <div class="score-line" id="final-score">0</div>
    <p id="over-msg">Keep practising to beat your best!</p>
    <button class="btn-play" id="btn-restart">↺ Play Again</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const gameArea = document.getElementById('game-area');
  const scoreEl = document.getElementById('score-val');
  const levelEl = document.getElementById('level-val');
  const livesEl = document.getElementById('lives-display');
  const bestEl = document.getElementById('best-val');
  const finalEl = document.getElementById('final-score');
  const overMsg = document.getElementById('over-msg');
  const comboToast = document.getElementById('combo-toast');
  const screenStart = document.getElementById('screen-start');
  const screenOver = document.getElementById('screen-over');

  let W, H;
  let bubbles = [], particles = [], floatTexts = [];
  let score = 0, lives = 3, level = 1, best = 0;
  let running = false;
  let spawnTimer = 0, spawnInterval = 110;
  let combo = 0, comboTimer = 0;
  let raf;

  const COLORS = [
    { fill: '#f472b6', glow: '#f472b680' },
    { fill: '#38bdf8', glow: '#38bdf880' },
    { fill: '#06d6a0', glow: '#06d6a080' },
    { fill: '#ffd166', glow: '#ffd16680' },
    { fill: '#a78bfa', glow: '#a78bfa80' },
    { fill: '#fb7185', glow: '#fb718580' },
    { fill: '#34d399', glow: '#34d39980' },
  ];

  // Special bubble types
  const TYPES = {
    NORMAL:  { weight: 70, scoreBase: 10 },
    FAST:    { weight: 15, scoreBase: 20 },
    BIG:     { weight: 10, scoreBase: 5  },
    BONUS:   { weight: 5,  scoreBase: 50 },
  };

  function resize() {
    W = canvas.width  = gameArea.clientWidth;
    H = canvas.height = gameArea.clientHeight;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function pickType() {
    const roll = Math.random() * 100;
    let acc = 0;
    for (const [k, v] of Object.entries(TYPES)) {
      acc += v.weight;
      if (roll < acc) return k;
    }
    return 'NORMAL';
  }

  function spawnBubble() {
    const type = pickType();
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    let r, speed;
    if (type === 'BIG')   { r = 36 + Math.random() * 14; speed = 0.6 + Math.random() * 0.3; }
    else if (type === 'FAST') { r = 18 + Math.random() * 8;  speed = 1.6 + Math.random() * 0.8 + level * 0.1; }
    else if (type === 'BONUS') { r = 22 + Math.random() * 6; speed = 0.9 + Math.random() * 0.4; }
    else { r = 22 + Math.random() * 16; speed = 0.8 + Math.random() * 0.5 + level * 0.05; }

    const x = r + Math.random() * (W - r * 2);
    const wobbleAmp   = 0.5 + Math.random() * 1.0;
    const wobbleSpeed = 0.015 + Math.random() * 0.02;
    const wobbleOffset = Math.random() * Math.PI * 2;

    bubbles.push({
      x, y: H + r,
      r, speed, color, type,
      wobbleAmp, wobbleSpeed, wobbleOffset,
      t: 0,
      pop: false, popT: 0,
      scale: 1,
      alpha: 1,
    });
  }

  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
      const speed = 2 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        r: 3 + Math.random() * 4,
        color: color.fill,
        alpha: 1,
        life: 1,
      });
    }
  }

  function spawnFloatText(x, y, text, color = '#ffd166') {
    floatTexts.push({ x, y, text, color, alpha: 1, vy: -1.5 });
  }

  function updateCombo() {
    if (combo >= 3) {
      comboToast.textContent = `${combo}x COMBO!`;
      comboToast.style.left = (W / 2 - 60) + 'px';
      comboToast.style.top  = (H * 0.3) + 'px';
      comboToast.style.opacity = '1';
      clearTimeout(window._comboClear);
      window._comboClear = setTimeout(() => { comboToast.style.opacity = '0'; }, 800);
    }
  }

  function popBubble(b, cx, cy) {
    if (b.pop) return;
    b.pop = true;
    const multiplier = combo >= 5 ? 3 : combo >= 3 ? 2 : 1;
    const pts = TYPES[b.type].scoreBase * multiplier;
    score += pts;
    combo++;
    comboTimer = 120;
    updateCombo();

    spawnParticles(cx, cy, b.color, b.type === 'BONUS' ? 18 : 10);
    const label = pts >= 50 ? `+${pts} 🌟` : `+${pts}`;
    spawnFloatText(cx, cy - b.r, label, b.color.fill);
    scoreEl.textContent = score;

    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('bubbleBest', best);
    }

    // Level up every 200 pts
    const newLevel = Math.floor(score / 200) + 1;
    if (newLevel > level) {
      level = newLevel;
      levelEl.textContent = level;
      spawnInterval = Math.max(50, 110 - level * 8);
    }
  }

  function renderBubble(b) {
    ctx.save();
    ctx.globalAlpha = b.alpha;
    ctx.translate(b.x, b.y);
    ctx.scale(b.scale, b.scale);

    // Glow
    const grad = ctx.createRadialGradient(0, 0, b.r * 0.1, 0, 0, b.r * 1.4);
    grad.addColorStop(0, b.color.glow);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, b.r * 1.4, 0, Math.PI * 2);
    ctx.fill();

    // Bubble body
    const bodyGrad = ctx.createRadialGradient(-b.r * 0.3, -b.r * 0.3, b.r * 0.05, 0, 0, b.r);
    bodyGrad.addColorStop(0, b.color.fill + 'cc');
    bodyGrad.addColorStop(0.6, b.color.fill + '99');
    bodyGrad.addColorStop(1, b.color.fill + '44');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(-b.r * 0.28, -b.r * 0.3, b.r * 0.22, b.r * 0.14, -0.5, 0, Math.PI * 2);
    ctx.fill();

    // Type indicator
    if (b.type === 'BONUS') {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${b.r * 0.6}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', 0, 0);
    } else if (b.type === 'FAST') {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = `bold ${b.r * 0.55}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚡', 0, 0);
    }

    ctx.restore();
  }

  function update() {
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnBubble();
      spawnTimer = 0;
    }

    // Combo decay
    if (comboTimer > 0) {
      comboTimer--;
    } else {
      combo = 0;
    }

    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.t++;

      if (b.pop) {
        b.popT++;
        b.scale = 1 + b.popT * 0.06;
        b.alpha = 1 - b.popT / 14;
        if (b.popT >= 14) { bubbles.splice(i, 1); }
        continue;
      }

      b.y -= b.speed;
      b.x += Math.sin(b.t * b.wobbleSpeed + b.wobbleOffset) * b.wobbleAmp;
      b.x = Math.max(b.r, Math.min(W - b.r, b.x));

      // Escaped
      if (b.y + b.r < 0) {
        lives--;
        renderLives();
        bubbles.splice(i, 1);
        combo = 0;
        if (lives <= 0) { gameOver(); return; }
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.12;
      p.life -= 0.04;
      p.alpha = p.life;
      if (p.life <= 0) { particles.splice(i, 1); }
    }

    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const ft = floatTexts[i];
      ft.y += ft.vy;
      ft.alpha -= 0.022;
      if (ft.alpha <= 0) { floatTexts.splice(i, 1); }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background grid dots
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    const gs = 40;
    for (let x = gs; x < W; x += gs)
      for (let y = gs; y < H; y += gs) {
        ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI * 2); ctx.fill();
      }

    bubbles.forEach(b => renderBubble(b));

    // Particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Float texts
    floatTexts.forEach(ft => {
      ctx.save();
      ctx.globalAlpha = ft.alpha;
      ctx.fillStyle = ft.color;
      ctx.font = 'bold 16px Segoe UI';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = ft.color;
      ctx.shadowBlur = 8;
      ctx.fillText(ft.text, ft.x, ft.y);
      ctx.restore();
    });
  }

  function loop() {
    if (!running) return;
    update();
    draw();
    raf = requestAnimationFrame(loop);
  }

  function renderLives() {
    livesEl.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = i < lives ? '❤️' : '🖤';
      livesEl.appendChild(h);
    }
  }

  function startGame() {
    bubbles = []; particles = []; floatTexts = [];
    score = 0; lives = 3; level = 1; combo = 0; comboTimer = 0;
    spawnTimer = 0; spawnInterval = 110;
    scoreEl.textContent = '0';
    levelEl.textContent = '1';
    renderLives();
    screenStart.classList.add('hidden');
    screenOver.classList.add('hidden');
    running = true;
    cancelAnimationFrame(raf);
    loop();
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(raf);
    finalEl.textContent = score;
    overMsg.textContent = score >= best
      ? '🏆 New best score!'
      : `Best: ${best} — Keep going!`;
    screenOver.classList.remove('hidden');
  }

  function hitTest(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const touches = e.changedTouches || [e];
    for (const t of touches) {
      const cx = (t.clientX - rect.left) * scaleX;
      const cy = (t.clientY - rect.top)  * scaleY;
      let hit = false;
      // Check in reverse so topmost bubble wins
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        if (b.pop) continue;
        const dx = cx - b.x, dy = cy - b.y;
        if (dx * dx + dy * dy <= b.r * b.r) {
          popBubble(b, cx, cy);
          hit = true;
          break;
        }
      }
      // Miss penalty
      if (!hit) { combo = 0; }
    }
  }

  canvas.addEventListener('click',     hitTest);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); hitTest(e); }, { passive: false });

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-restart').addEventListener('click', startGame);

  window.addEventListener('resize', () => { resize(); });

  best = parseInt(localStorage.getItem('bubbleBest') || '0');
  bestEl.textContent = best;
  renderLives();
  resize();

  // Draw idle background
  (function idleDraw() {
    if (running) return;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    const gs = 40;
    for (let x = gs; x < W; x += gs)
      for (let y = gs; y < H; y += gs) {
        ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI * 2); ctx.fill();
      }
    requestAnimationFrame(idleDraw);
  })();
})();
</script>
</body>
</html>
