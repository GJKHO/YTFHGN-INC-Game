<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Maze Chase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
      touch-action: none;
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .hud-block { text-align: center; }
    .hud-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .hud-value { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.1; }

    #lives-display { display: flex; gap: 4px; align-items: center; justify-content: center; }
    .heart { font-size: 18px; }

    #game-area {
      position: relative;
      width: 100%;
      max-width: 480px;
      flex: 1;
      overflow: hidden;
    }

    canvas { display: block; width: 100%; height: 100%; }

    #dpad {
      position: absolute;
      left: 14px;
      bottom: 14px;
      width: 140px;
      height: 140px;
      z-index: 5;
      opacity: 0.85;
      display: none;
    }
    #dpad.visible { display: block; }
    .dpad-btn {
      position: absolute;
      width: 46px; height: 46px;
      background: rgba(56,189,248,0.18);
      border: 1px solid rgba(56,189,248,0.45);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #7dd3fc;
      font-size: 20px;
      font-weight: 700;
    }
    .dpad-btn.active { background: rgba(56,189,248,0.45); }
    #dpad-up    { left: 47px; top: 0; }
    #dpad-down  { left: 47px; top: 94px; }
    #dpad-left  { left: 0;    top: 47px; }
    #dpad-right { left: 94px; top: 47px; }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(10,14,26,0.88);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .screen.hidden { display: none; }

    .screen h2 {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }
    .screen p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
      padding: 0 16px;
    }
    .screen .score-line {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-play {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      color: #0a0e1a;
      box-shadow: 0 0 24px rgba(56,189,248,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 32px rgba(56,189,248,0.55); }
    .btn-play:active { transform: scale(0.97); }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="score-val">0</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Level</div>
    <div class="hud-value" id="level-val">1</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Lives</div>
    <div id="lives-display"></div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Best</div>
    <div class="hud-value" id="best-val">0</div>
  </div>
</div>

<div id="game-area">
  <canvas id="canvas"></canvas>

  <div id="dpad">
    <div class="dpad-btn" id="dpad-up">▲</div>
    <div class="dpad-btn" id="dpad-left">◀</div>
    <div class="dpad-btn" id="dpad-right">▶</div>
    <div class="dpad-btn" id="dpad-down">▼</div>
  </div>

  <div class="screen" id="screen-start">
    <h2>Maze Chase</h2>
    <p>Collect every dot to clear the level.<br>Avoid the red hunters — grab a power pellet to turn the tables!</p>
    <button class="btn-play" id="btn-start">▶ Start Game</button>
    <div class="hint">Arrow keys / WASD · swipe or D-pad on mobile</div>
  </div>

  <div class="screen hidden" id="screen-over">
    <h2 id="over-title">Game Over</h2>
    <div class="score-line" id="final-score">0</div>
    <p id="over-msg">Try again to beat your best!</p>
    <button class="btn-play" id="btn-restart">↺ Play Again</button>
  </div>
</div>

<script>
(() => {
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const gameArea = document.getElementById('game-area');
  const scoreEl  = document.getElementById('score-val');
  const levelEl  = document.getElementById('level-val');
  const livesEl  = document.getElementById('lives-display');
  const bestEl   = document.getElementById('best-val');
  const finalEl  = document.getElementById('final-score');
  const overTitle = document.getElementById('over-title');
  const overMsg  = document.getElementById('over-msg');
  const screenStart = document.getElementById('screen-start');
  const screenOver  = document.getElementById('screen-over');
  const dpad = document.getElementById('dpad');

  // Maze grid. '#' wall, '.' dot, 'o' power pellet, ' ' empty, 'P' player spawn, 'G' ghost spawn
  const MAP = [
    '###############',
    '#.....#.......#',
    '#.###.#.#####.#',
    '#o#.........#o#',
    '#.#.###.###.#.#',
    '#......G......#',
    '###.#.###.#.###',
    '#...#..P..#...#',
    '#.#.#.###.#.#.#',
    '#.#.........#.#',
    '#.#.###.###.#.#',
    '#o..#.....#..o#',
    '###.#.###.#.###',
    '#.....#.#.....#',
    '#.###.#.#.###.#',
    '#.............#',
    '###############',
  ];

  const COLS = MAP[0].length;
  const ROWS = MAP.length;

  // Movement is integer-grid based. A mover has:
  //   gx, gy : current integer cell (always valid, never on a wall)
  //   dir    : { x, y } current direction (null when idle)
  //   step   : how far into the current direction we've moved, in [0, STEPS_PER_CELL)
  // When step >= STEPS_PER_CELL, we commit the step: gx += dir.x, gy += dir.y, step = 0.
  // This avoids any floating-point drift between cells.
  const STEPS_PER_CELL = 24; // higher = smoother

  let tile;
  let offsetX, offsetY;
  let W, H;

  let grid;
  let player;
  let ghosts;
  let dots;
  let score = 0, lives = 3, level = 1, best = 0;
  let powerTimer = 0;
  let freezeTimer = 0; // brief freeze after respawning
  let running = false;
  let raf;
  let inputQueue = null;
  const keys = new Set();

  function resize() {
    W = canvas.width  = gameArea.clientWidth;
    H = canvas.height = gameArea.clientHeight;
    tile = Math.floor(Math.min(W / COLS, H / ROWS));
    offsetX = Math.floor((W - tile * COLS) / 2);
    offsetY = Math.floor((H - tile * ROWS) / 2);
  }

  function isWall(cx, cy) {
    if (cx < 0 || cy < 0 || cx >= COLS || cy >= ROWS) return true;
    const row = grid[cy];
    if (!row) return true;
    return row[cx] === '#';
  }

  function dirEq(a, b) {
    if (!a || !b) return false;
    return a.x === b.x && a.y === b.y;
  }

  function initMaze() {
    grid = MAP.map(row => row.split(''));
    dots = 0;
    let playerSpawn = { x: 7, y: 7 };
    const ghostSpawns = [];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = grid[y][x];
        if (c === '.' || c === 'o') dots++;
        else if (c === 'P') { playerSpawn = { x, y }; grid[y][x] = ' '; }
        else if (c === 'G') { ghostSpawns.push({ x, y }); grid[y][x] = ' '; }
      }
    }
    if (ghostSpawns.length === 0) ghostSpawns.push({ x: 7, y: 5 });

    player = {
      gx: playerSpawn.x, gy: playerSpawn.y,
      dir: null,
      step: 0,
      speed: 0.6, // steps per frame (out of STEPS_PER_CELL)
      spawn: playerSpawn,
      mouthT: 0,
    };

    const ghostColors = ['#ef4444', '#f472b6', '#fb923c', '#a78bfa'];
    const ghostCount = Math.min(2 + Math.floor((level - 1) / 2), 4);
    ghosts = [];
    for (let i = 0; i < ghostCount; i++) {
      const sp = ghostSpawns[i % ghostSpawns.length];
      ghosts.push({
        gx: sp.x, gy: sp.y,
        dir: null,
        step: 0,
        speed: 0.42 + level * 0.03,
        color: ghostColors[i % ghostColors.length],
        spawn: sp,
        mode: 'chase', // 'chase' | 'scared' | 'eaten'
        t: Math.random() * 1000,
        startDelay: i * 40,
      });
    }
    powerTimer = 0;
    freezeTimer = 30;
  }

  function renderLives() {
    livesEl.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = i < lives ? '❤️' : '🖤';
      livesEl.appendChild(h);
    }
  }

  function moverCenterPx(m) {
    // Smooth pixel position: interpolate between current cell and target cell using step/STEPS_PER_CELL
    const progress = m.dir ? m.step / STEPS_PER_CELL : 0;
    const dx = m.dir ? m.dir.x : 0;
    const dy = m.dir ? m.dir.y : 0;
    const fx = m.gx + dx * progress;
    const fy = m.gy + dy * progress;
    return {
      x: offsetX + fx * tile + tile / 2,
      y: offsetY + fy * tile + tile / 2,
    };
  }

  // Try to turn the player to `dir` at the current cell.
  // Only valid when we're not mid-step (step === 0).
  function tryTurnPlayer(dir) {
    if (player.step !== 0) return false;
    if (isWall(player.gx + dir.x, player.gy + dir.y)) return false;
    player.dir = dir;
    return true;
  }

  function advanceMover(m, speedOverride) {
    if (!m.dir) { m.step = 0; return false; }
    let sp = speedOverride != null ? speedOverride : m.speed;
    if (!Number.isFinite(sp) || sp <= 0) sp = 0.1;
    if (sp > STEPS_PER_CELL) sp = STEPS_PER_CELL;
    m.step += sp;
    if (m.step >= STEPS_PER_CELL) {
      m.gx += m.dir.x;
      m.gy += m.dir.y;
      m.step = 0;
      return true;
    }
    return false;
  }

  function updatePlayer() {
    // At cell boundary, take any queued / held direction input.
    if (player.step === 0) {
      let dir = inputQueue;
      if (!dir) {
        if      (keys.has('ArrowUp')    || keys.has('KeyW')) dir = { x: 0, y: -1 };
        else if (keys.has('ArrowDown')  || keys.has('KeyS')) dir = { x: 0, y: 1 };
        else if (keys.has('ArrowLeft')  || keys.has('KeyA')) dir = { x: -1, y: 0 };
        else if (keys.has('ArrowRight') || keys.has('KeyD')) dir = { x: 1, y: 0 };
      }
      if (dir && tryTurnPlayer(dir)) {
        inputQueue = null;
      } else if (player.dir && isWall(player.gx + player.dir.x, player.gy + player.dir.y)) {
        player.dir = null;
      }
    }

    advanceMover(player);
    player.mouthT += 0.25;

    // Collect whatever is under us (whenever we're on a cell center: step === 0)
    if (player.step === 0) {
      const cell = grid[player.gy][player.gx];
      if (cell === '.') {
        grid[player.gy][player.gx] = ' ';
        score += 10; dots--; scoreEl.textContent = score; updateBest();
      } else if (cell === 'o') {
        grid[player.gy][player.gx] = ' ';
        score += 50; dots--; scoreEl.textContent = score; updateBest();
        powerTimer = 360;
        for (const g of ghosts) if (g.mode !== 'eaten') g.mode = 'scared';
      }
      if (dots <= 0) nextLevel();
    }
  }

  function chooseGhostDir(g) {
    const back = g.dir ? { x: -g.dir.x, y: -g.dir.y } : null;
    const dirs = [ {x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1} ];
    const opts = [];
    for (const d of dirs) {
      if (isWall(g.gx + d.x, g.gy + d.y)) continue;
      if (dirEq(d, back)) continue;
      opts.push(d);
    }
    // If dead end, reversing is allowed
    if (opts.length === 0) {
      for (const d of dirs) {
        if (!isWall(g.gx + d.x, g.gy + d.y)) opts.push(d);
      }
    }
    if (opts.length === 0) { g.dir = null; return; }

    let pickBest = opts[0];
    let bestScore = -Infinity;
    for (const d of opts) {
      const nx = g.gx + d.x, ny = g.gy + d.y;
      const dx = nx - player.gx, dy = ny - player.gy;
      const dist = Math.abs(dx) + Math.abs(dy);
      let s;
      if (g.mode === 'eaten')       s = -dist + ((nx === g.spawn.x && ny === g.spawn.y) ? 100 : 0);
      else if (g.mode === 'scared') s = dist;
      else                          s = -dist;
      s += Math.random() * 0.8;
      if (s > bestScore) { bestScore = s; pickBest = d; }
    }
    g.dir = pickBest;
  }

  function updateGhost(g) {
    g.t++;
    if (g.startDelay > 0) { g.startDelay--; return; }

    // Arrived home while eaten — restore
    if (g.mode === 'eaten' && g.step === 0 && g.gx === g.spawn.x && g.gy === g.spawn.y) {
      g.mode = powerTimer > 0 ? 'scared' : 'chase';
      g.dir = null;
    }

    if (g.step === 0) chooseGhostDir(g);

    let sp = g.speed;
    if (g.mode === 'eaten')       sp *= 1.8;
    else if (g.mode === 'scared') sp *= 0.6;
    // Safety clamp: speed must be positive and bounded so step always progresses
    if (!Number.isFinite(sp) || sp <= 0) sp = 0.1;
    if (sp > STEPS_PER_CELL) sp = STEPS_PER_CELL;
    advanceMover(g, sp);
  }

  // Collision uses smooth pixel-space distance
  function checkCollisions() {
    const p = moverCenterPx(player);
    for (const g of ghosts) {
      if (g.startDelay > 0) continue;
      const gp = moverCenterPx(g);
      const dx = gp.x - p.x, dy = gp.y - p.y;
      const r = tile * 0.5;
      if (dx*dx + dy*dy < r*r) {
        if (g.mode === 'eaten') continue;
        if (g.mode === 'scared') {
          g.mode = 'eaten';
          score += 200;
          scoreEl.textContent = score;
          updateBest();
        } else {
          loseLife();
          return;
        }
      }
    }
  }

  function loseLife() {
    lives--;
    renderLives();
    if (lives <= 0) {
      gameOver(false);
      return;
    }
    // Respawn player and ghosts in place
    player.gx = player.spawn.x; player.gy = player.spawn.y;
    player.dir = null; player.step = 0;
    for (const g of ghosts) {
      g.gx = g.spawn.x; g.gy = g.spawn.y;
      g.dir = null; g.step = 0;
      g.mode = 'chase';
      g.startDelay = 20;
    }
    powerTimer = 0;
    freezeTimer = 45;
    inputQueue = null;
  }

  function nextLevel() {
    level++;
    levelEl.textContent = level;
    score += 100;
    scoreEl.textContent = score;
    updateBest();
    initMaze();
  }

  function updateBest() {
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      try { localStorage.setItem('mazeChaseBest', best); } catch (_) {}
    }
  }

  function update() {
    if (freezeTimer > 0) { freezeTimer--; return; }
    if (powerTimer > 0) {
      powerTimer--;
      if (powerTimer === 0) {
        for (const g of ghosts) if (g.mode === 'scared') g.mode = 'chase';
      }
    }
    updatePlayer();
    for (const g of ghosts) updateGhost(g);
    checkCollisions();
  }

  function drawMaze() {
    ctx.save();
    ctx.translate(offsetX, offsetY);

    ctx.lineWidth = Math.max(2, tile * 0.12);
    ctx.strokeStyle = '#38bdf8';
    ctx.shadowColor = '#38bdf866';
    ctx.shadowBlur = 4;

    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x] !== '#') continue;
        const px = x * tile, py = y * tile;
        const top = isWall(x, y - 1);
        const bottom = isWall(x, y + 1);
        const left = isWall(x - 1, y);
        const right = isWall(x + 1, y);
        ctx.beginPath();
        if (!top)    { ctx.moveTo(px, py);            ctx.lineTo(px + tile, py); }
        if (!bottom) { ctx.moveTo(px, py + tile);     ctx.lineTo(px + tile, py + tile); }
        if (!left)   { ctx.moveTo(px, py);            ctx.lineTo(px, py + tile); }
        if (!right)  { ctx.moveTo(px + tile, py);     ctx.lineTo(px + tile, py + tile); }
        ctx.stroke();
      }
    }
    ctx.shadowBlur = 0;

    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = grid[y][x];
        const cx = x * tile + tile / 2;
        const cy = y * tile + tile / 2;
        if (c === '.') {
          ctx.fillStyle = '#fde68a';
          ctx.beginPath(); ctx.arc(cx, cy, Math.max(1.5, tile * 0.08), 0, Math.PI * 2); ctx.fill();
        } else if (c === 'o') {
          const pulse = 0.7 + Math.sin(Date.now() / 180) * 0.3;
          ctx.fillStyle = '#ffd166';
          ctx.shadowColor = '#ffd16688';
          ctx.shadowBlur = 10;
          ctx.beginPath(); ctx.arc(cx, cy, tile * 0.22 * pulse, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
    }
    ctx.restore();
  }

  function drawPlayer() {
    const { x, y } = moverCenterPx(player);
    const r = tile * 0.38;
    let angle = 0;
    if (player.dir) {
      if (player.dir.x === 1)  angle = 0;
      else if (player.dir.x === -1) angle = Math.PI;
      else if (player.dir.y === 1)  angle = Math.PI / 2;
      else if (player.dir.y === -1) angle = -Math.PI / 2;
    }
    const mouth = (Math.sin(player.mouthT) + 1) / 2 * 0.5 + 0.05;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    const grad = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.8);
    grad.addColorStop(0, '#ffd16688');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd166';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, r, mouth, Math.PI * 2 - mouth);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#0a0e1a';
    ctx.beginPath(); ctx.arc(-r * 0.15, -r * 0.5, r * 0.14, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawGhost(g) {
    const { x, y } = moverCenterPx(g);
    if (!Number.isFinite(x) || !Number.isFinite(y) || tile <= 0) return;
    const r = tile * 0.38;
    ctx.save();
    ctx.translate(x, y);

    let color = g.color;
    let bodyAlpha = 1;
    if (g.mode === 'eaten') {
      color = '#ffffff';
      bodyAlpha = 0.25;
    } else if (g.mode === 'scared') {
      const flicker = powerTimer < 90 && Math.floor(powerTimer / 10) % 2 === 0;
      color = flicker ? '#ffffff' : '#3b82f6';
    }

    if (g.mode !== 'eaten') {
      ctx.globalAlpha = 0.6;
      const grad = ctx.createRadialGradient(0, 0, Math.max(1, r * 0.3), 0, 0, Math.max(2, r * 1.6));
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.globalAlpha = bodyAlpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -r * 0.1, r, Math.PI, 0, false);
    ctx.lineTo(r, r * 0.7);
    const waves = 4;
    const step = (r * 2) / waves;
    const wavePhase = Math.floor(g.t / 10) % 2 === 0 ? 0 : 1;
    for (let i = 0; i < waves; i++) {
      const xStart = r - step * i;
      const xEnd   = r - step * (i + 1);
      const yLow   = (i + wavePhase) % 2 === 0 ? r * 0.85 : r * 0.55;
      ctx.lineTo(xStart - step / 2, yLow);
      ctx.lineTo(xEnd, r * 0.7);
    }
    ctx.closePath();
    ctx.fill();

    const lookX = g.dir ? g.dir.x : 0;
    const lookY = g.dir ? g.dir.y : 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.2, r * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( r * 0.3, -r * 0.2, r * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = g.mode === 'scared' ? '#ef4444' : '#0a0e1a';
    ctx.beginPath(); ctx.arc(-r * 0.3 + lookX * r * 0.1, -r * 0.2 + lookY * r * 0.1, r * 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( r * 0.3 + lookX * r * 0.1, -r * 0.2 + lookY * r * 0.1, r * 0.1, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0a1428';
    ctx.fillRect(offsetX, offsetY, tile * COLS, tile * ROWS);
    drawMaze();
    if (player) drawPlayer();
    if (ghosts) for (const g of ghosts) drawGhost(g);
  }

  function safeFrame() {
    // Any runtime error in update/draw would otherwise silently kill the rAF loop.
    // Catching it lets us log it and keep the loop alive so the game doesn't appear frozen.
    try {
      update();
      draw();
    } catch (err) {
      console.error('Maze Chase frame error:', err);
    }
  }

  function loop() {
    if (!running) return;
    safeFrame();
    raf = requestAnimationFrame(loop);
  }

  function startGame() {
    resize();
    score = 0; lives = 3; level = 1;
    scoreEl.textContent = '0';
    levelEl.textContent = '1';
    renderLives();
    initMaze();
    inputQueue = null;
    keys.clear();
    screenStart.classList.add('hidden');
    screenOver.classList.add('hidden');
    running = true;
    cancelAnimationFrame(raf);
    loop();
  }

  function gameOver(win) {
    running = false;
    cancelAnimationFrame(raf);
    finalEl.textContent = score;
    overTitle.textContent = win ? 'You Cleared It!' : 'Game Over';
    overMsg.textContent = score >= best && score > 0
      ? '🏆 New best score!'
      : `Best: ${best} — Keep going!`;
    screenOver.classList.remove('hidden');
  }

  // Input
  window.addEventListener('keydown', e => {
    const code = e.code;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].includes(code)) {
      keys.add(code);
      if (code === 'ArrowUp'   || code === 'KeyW') inputQueue = { x: 0, y: -1 };
      if (code === 'ArrowDown' || code === 'KeyS') inputQueue = { x: 0, y: 1 };
      if (code === 'ArrowLeft' || code === 'KeyA') inputQueue = { x: -1, y: 0 };
      if (code === 'ArrowRight'|| code === 'KeyD') inputQueue = { x: 1, y: 0 };
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => { keys.delete(e.code); });
  window.addEventListener('blur', () => { keys.clear(); });

  // Touch swipe on canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (!touchStart) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const threshold = 22;
    if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;
    if (Math.abs(dx) > Math.abs(dy)) inputQueue = { x: dx > 0 ? 1 : -1, y: 0 };
    else inputQueue = { x: 0, y: dy > 0 ? 1 : -1 };
    touchStart = { x: t.clientX, y: t.clientY };
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => { touchStart = null; });

  function isTouchDevice() {
    return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  }
  if (isTouchDevice()) dpad.classList.add('visible');

  function bindDpad(id, dir) {
    const el = document.getElementById(id);
    const press   = e => { e.preventDefault(); inputQueue = dir; el.classList.add('active'); };
    const release = () => el.classList.remove('active');
    el.addEventListener('touchstart', press, { passive: false });
    el.addEventListener('mousedown',  press);
    el.addEventListener('touchend',   release);
    el.addEventListener('mouseup',    release);
    el.addEventListener('mouseleave', release);
  }
  bindDpad('dpad-up',    { x: 0, y: -1 });
  bindDpad('dpad-down',  { x: 0, y: 1 });
  bindDpad('dpad-left',  { x: -1, y: 0 });
  bindDpad('dpad-right', { x: 1, y: 0 });

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-restart').addEventListener('click', startGame);

  window.addEventListener('resize', resize);

  try { best = parseInt(localStorage.getItem('mazeChaseBest') || '0') || 0; } catch (_) { best = 0; }
  bestEl.textContent = best;
  renderLives();
  resize();
  initMaze();
  draw();

  (function idleLoop() {
    if (running) return;
    draw();
    requestAnimationFrame(idleLoop);
  })();
})();
</script>
</body>
</html>
