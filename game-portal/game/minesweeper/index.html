<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minesweeper</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0f0f13;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:hidden;
  user-select:none;
}
canvas {
  display:block;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 60px rgba(124,106,255,0.12);
  cursor:pointer;
}
#overlay {
  position:fixed;
  inset:0;
  background:rgba(15,15,19,0.9);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  backdrop-filter:blur(6px);
}
#overlay h2 {
  font-size:32px;
  font-weight:900;
  letter-spacing:-1px;
  background:linear-gradient(135deg,#fff 30%,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
#ov-sub { color:#8888a0; font-size:13px; text-align:center; max-width:270px; line-height:1.7; }
.diff-row { display:flex; gap:10px; }
.diff-btn {
  padding:10px 22px;
  background:rgba(167,139,250,0.1);
  color:#c4b5fd;
  border:1px solid rgba(167,139,250,0.25);
  border-radius:8px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s;
  text-align:center;
  line-height:1.5;
}
.diff-btn small { display:block; opacity:0.6; font-weight:400; font-size:11px; }
.diff-btn:hover, .diff-btn.active {
  background:linear-gradient(135deg,#7c6aff,#a855f7);
  color:#fff;
  border-color:transparent;
  box-shadow:0 4px 16px rgba(124,106,255,0.4);
}
#ov-btn {
  padding:12px 40px;
  background:linear-gradient(135deg,#7c6aff,#a855f7);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(124,106,255,0.4);
  transition:transform 0.15s,box-shadow 0.15s;
}
#ov-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(124,106,255,0.55); }
#overlay.hidden { display:none; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="overlay">
  <h2 id="ov-title">Minesweeper</h2>
  <p id="ov-sub">Left-click to reveal · Right-click (or long-press) to flag<br>Clear the board without hitting any mines!</p>
  <div class="diff-row">
    <button class="diff-btn active" data-diff="easy">Easy<small>9×9 · 10 mines</small></button>
    <button class="diff-btn"        data-diff="medium">Medium<small>16×16 · 40 mines</small></button>
  </div>
  <button id="ov-btn">Start Game</button>
</div>

<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovSub   = document.getElementById('ov-sub');
const ovBtn   = document.getElementById('ov-btn');

// ── Canvas ────────────────────────────────────────────
const CW = 480, CH = 480;
canvas.width = CW; canvas.height = CH;

const HUD_H  = 54;
const HUD_CX = CW / 2, HUD_CY = HUD_H / 2;
const BTN_R  = 18;

// ── Difficulty presets ────────────────────────────────
const DIFFS = {
  easy:   { rows:9,  cols:9,  mines:10, cell:44 },
  medium: { rows:16, cols:16, mines:40, cell:26 },
};

// Number colours (classic palette brightened for dark bg)
const NUM_C = ['','#60a5fa','#4ade80','#f87171','#818cf8','#fb923c','#2dd4bf','#e8e8f0','#94a3b8'];

// ── State ─────────────────────────────────────────────
let dKey = 'easy';
let R, C, M, CELL, GX, GY;
let board = [];
let gState  = 'idle';  // idle | playing | won | lost
let firstClick = true;
let minesLeft = 0, revealCount = 0, elapsed = 0;
let faceMode  = 'normal'; // normal | cool | dead
let hovR = -1, hovC = -1;
let timerInt = null;
let lpTimer = null, lpCell = null; // long-press tracking

// ── Difficulty buttons ────────────────────────────────
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dKey = btn.dataset.diff;
  });
});
ovBtn.addEventListener('click', startGame);

// ── Setup ─────────────────────────────────────────────
function setupConfig() {
  const d = DIFFS[dKey];
  R = d.rows; C = d.cols; M = d.mines; CELL = d.cell;
  GX = Math.round((CW - C * CELL) / 2);
  GY = HUD_H + Math.round(((CH - HUD_H) - R * CELL) / 2);
}

function startGame() {
  setupConfig();
  board = Array.from({length:R}, () =>
    Array.from({length:C}, () => ({
      mine:false, revealed:false, flagged:false,
      count:0, exploded:false, wrongFlag:false
    }))
  );
  gState = 'playing';
  firstClick = true;
  minesLeft = M; revealCount = 0; elapsed = 0;
  faceMode = 'normal';
  hovR = hovC = -1;
  if (timerInt) clearInterval(timerInt);
  timerInt = null;
  overlay.classList.add('hidden');
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < M) {
    const r = rnd(R), c = rnd(C);
    if (board[r][c].mine) continue;
    if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
    board[r][c].mine = true;
    placed++;
  }
  eachCell((r, c) => {
    if (board[r][c].mine) return;
    let n = 0;
    eachNeighbor(r, c, (nr, nc) => { if (board[nr][nc].mine) n++; });
    board[r][c].count = n;
  });
}

function rnd(n) { return Math.floor(Math.random() * n); }

function eachCell(fn) {
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) fn(r, c);
}

function eachNeighbor(r, c, fn) {
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < R && nc >= 0 && nc < C) fn(nr, nc);
    }
}

// ── Game logic ────────────────────────────────────────
function revealCell(r, c) {
  if (gState !== 'playing') return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInt = setInterval(() => elapsed++, 1000);
  }

  if (cell.mine) {
    cell.revealed = true;
    cell.exploded = true;
    gState = 'lost';
    faceMode = 'dead';
    clearInterval(timerInt);
    // Reveal all mines; mark wrong flags
    eachCell((r2, c2) => {
      const cl = board[r2][c2];
      if (cl.mine && !cl.flagged)  cl.revealed  = true;
      if (!cl.mine && cl.flagged)  cl.wrongFlag = true;
    });
    setTimeout(showEnd, 700);
  } else {
    flood(r, c);
    checkWin();
  }
}

function flood(r, c) {
  const cell = board[r][c];
  if (cell.revealed || cell.flagged || cell.mine) return;
  cell.revealed = true;
  revealCount++;
  if (cell.count === 0) eachNeighbor(r, c, (nr, nc) => flood(nr, nc));
}

function toggleFlag(r, c) {
  if (gState !== 'playing') return;
  const cell = board[r][c];
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  minesLeft += cell.flagged ? -1 : 1;
}

function chord(r, c) {
  if (gState !== 'playing') return;
  const cell = board[r][c];
  if (!cell.revealed || cell.count <= 0) return;
  let flags = 0;
  eachNeighbor(r, c, (nr, nc) => { if (board[nr][nc].flagged) flags++; });
  if (flags === cell.count)
    eachNeighbor(r, c, (nr, nc) => revealCell(nr, nc));
}

function checkWin() {
  if (revealCount !== R * C - M) return;
  gState = 'won';
  faceMode = 'cool';
  clearInterval(timerInt);
  eachCell((r, c) => { if (board[r][c].mine) { board[r][c].flagged = true; } });
  minesLeft = 0;
  setTimeout(showEnd, 600);
}

function showEnd() {
  if (gState === 'won') {
    ovTitle.textContent = '🎉 You Win!';
    ovSub.textContent   = `Board cleared in ${elapsed}s!`;
  } else {
    ovTitle.textContent = '💥 Game Over';
    ovSub.textContent   = `You hit a mine! Time: ${elapsed}s`;
  }
  ovBtn.textContent = 'Play Again';
  overlay.classList.remove('hidden');
}

// ── Input ─────────────────────────────────────────────
function toCV(e) {
  const rect = canvas.getBoundingClientRect();
  return { x:(e.clientX-rect.left)*(CW/rect.width), y:(e.clientY-rect.top)*(CH/rect.height) };
}

function cellAt(px, py) {
  const c = Math.floor((px - GX) / CELL);
  const r = Math.floor((py - GY) / CELL);
  if (r >= 0 && r < R && c >= 0 && c < C) return {r, c};
  return null;
}

function nearBtn(px, py) { return Math.hypot(px - HUD_CX, py - HUD_CY) <= BTN_R + 5; }

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const {x, y} = toCV(e);
  const cl = cellAt(x, y);
  if (cl) toggleFlag(cl.r, cl.c);
});

canvas.addEventListener('click', e => {
  const {x, y} = toCV(e);
  if (nearBtn(x, y) && gState !== 'idle') { startGame(); return; }
  const cl = cellAt(x, y);
  if (!cl) return;
  if (board[cl.r][cl.c].revealed) chord(cl.r, cl.c);
  else revealCell(cl.r, cl.c);
});

canvas.addEventListener('mousemove', e => {
  const {x, y} = toCV(e);
  const cl = cellAt(x, y);
  hovR = cl ? cl.r : -1; hovC = cl ? cl.c : -1;
});
canvas.addEventListener('mouseleave', () => { hovR = hovC = -1; });

// Touch: tap = reveal, long-press = flag
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const {x, y} = toCV(e.touches[0]);
  if (nearBtn(x, y) && gState !== 'idle') { startGame(); return; }
  const cl = cellAt(x, y);
  if (!cl) return;
  lpCell = cl;
  lpTimer = setTimeout(() => {
    if (lpCell) { toggleFlag(lpCell.r, lpCell.c); }
    lpCell = lpTimer = null;
  }, 480);
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!lpTimer) return;
  clearTimeout(lpTimer); lpTimer = null;
  if (!lpCell) return;
  if (board[lpCell.r][lpCell.c].revealed) chord(lpCell.r, lpCell.c);
  else revealCell(lpCell.r, lpCell.c);
  lpCell = null;
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  clearTimeout(lpTimer); lpTimer = lpCell = null;
}, {passive:false});

// ── Draw helpers ──────────────────────────────────────
function drawUnrevealed(x, y, sz, hov) {
  const bw = Math.max(1.5, sz * 0.1);
  ctx.fillStyle = hov ? '#2e2848' : '#231f36';
  ctx.beginPath(); ctx.roundRect(x, y, sz, sz, 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  ctx.fillRect(x, y, sz, bw);
  ctx.fillRect(x, y, bw, sz);
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(x, y + sz - bw, sz, bw);
  ctx.fillRect(x + sz - bw, y, bw, sz);
}

function drawMine(cx, cy, r2, col) {
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = col;
  ctx.lineWidth = Math.max(1, r2 * 0.28);
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const a = i * Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*r2*0.85, cy + Math.sin(a)*r2*0.85);
    ctx.lineTo(cx + Math.cos(a)*r2*1.65, cy + Math.sin(a)*r2*1.65);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.beginPath(); ctx.arc(cx - r2*0.3, cy - r2*0.32, r2*0.25, 0, Math.PI*2); ctx.fill();
}

function drawFlagIcon(cx, cy, sz) {
  const s = sz * 0.38;
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = Math.max(1.5, sz * 0.07);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - s*0.1, cy + s);
  ctx.lineTo(cx - s*0.1, cy - s);
  ctx.stroke();
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.moveTo(cx - s*0.1, cy - s);
  ctx.lineTo(cx + s,     cy - s*0.3);
  ctx.lineTo(cx - s*0.1, cy + s*0.2);
  ctx.closePath(); ctx.fill();
}

function drawCross(cx, cy, r2) {
  ctx.strokeStyle = '#f87171';
  ctx.lineWidth = Math.max(2, r2 * 0.35);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - r2, cy - r2); ctx.lineTo(cx + r2, cy + r2);
  ctx.moveTo(cx + r2, cy - r2); ctx.lineTo(cx - r2, cy + r2);
  ctx.stroke();
}

// ── Render ────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#18181f';
  ctx.fillRect(0, 0, CW, CH);

  if (gState === 'idle') return;

  // HUD background
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  ctx.fillRect(0, 0, CW, HUD_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(CW, HUD_H); ctx.stroke();

  // Mine counter
  const mStr = String(Math.max(-99, minesLeft)).padStart(3, '0');
  ctx.font = '22px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#e8e8f0';
  ctx.fillText('🚩', 14, HUD_CY + 1);
  ctx.font = 'bold 19px monospace';
  ctx.fillStyle = minesLeft < 0 ? '#f87171' : '#e8e8f0';
  ctx.fillText(mStr, 44, HUD_CY + 1);

  // Timer
  const tStr = String(Math.min(elapsed, 999)).padStart(3, '0');
  ctx.font = 'bold 19px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#60a5fa';
  ctx.fillText(tStr, CW - 42, HUD_CY + 1);
  ctx.font = '22px sans-serif';
  ctx.fillStyle = '#e8e8f0';
  ctx.fillText('⏱', CW - 18, HUD_CY + 1);

  // Reset button
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(HUD_CX, HUD_CY, BTN_R, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.font = `${BTN_R * 1.25}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(faceMode === 'cool' ? '😎' : faceMode === 'dead' ? '😵' : '🙂', HUD_CX, HUD_CY + 1);
  ctx.restore();

  // Grid
  const SZ = CELL - 1;
  const FS = Math.max(11, Math.round(CELL * 0.48));

  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const cell = board[r][c];
      const x = GX + c * CELL;
      const y = GY + r * CELL;
      const hov = (r === hovR && c === hovC && !cell.revealed && !cell.flagged && gState === 'playing');

      if (cell.exploded) {
        // Clicked mine: red bg
        ctx.fillStyle = '#6b1010';
        ctx.beginPath(); ctx.roundRect(x, y, SZ, SZ, 2); ctx.fill();
        drawMine(x + SZ/2, y + SZ/2, SZ * 0.30, '#1a1a1a');

      } else if (cell.revealed && cell.mine) {
        // Other mines on loss
        ctx.fillStyle = '#1c1829';
        ctx.beginPath(); ctx.roundRect(x, y, SZ, SZ, 2); ctx.fill();
        drawMine(x + SZ/2, y + SZ/2, SZ * 0.28, '#f87171');

      } else if (cell.revealed) {
        // Safe revealed
        ctx.fillStyle = '#151122';
        ctx.beginPath(); ctx.roundRect(x, y, SZ, SZ, 2); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.roundRect(x, y, SZ, SZ, 2); ctx.stroke();
        if (cell.count > 0) {
          ctx.font = `bold ${FS}px -apple-system,sans-serif`;
          ctx.fillStyle = NUM_C[cell.count] || '#e8e8f0';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(cell.count, x + SZ/2, y + SZ/2 + 0.5);
        }

      } else if (cell.wrongFlag) {
        // Wrong flag: show mine + X
        ctx.fillStyle = '#1c1829';
        ctx.beginPath(); ctx.roundRect(x, y, SZ, SZ, 2); ctx.fill();
        drawMine(x + SZ/2, y + SZ/2, SZ * 0.25, '#555');
        drawCross(x + SZ/2, y + SZ/2, SZ * 0.28);

      } else if (cell.flagged) {
        drawUnrevealed(x, y, SZ, false);
        drawFlagIcon(x + SZ/2, y + SZ/2, SZ);

      } else {
        drawUnrevealed(x, y, SZ, hov);
      }
    }
  }
}

// ── Main loop ─────────────────────────────────────────
function loop() {
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
