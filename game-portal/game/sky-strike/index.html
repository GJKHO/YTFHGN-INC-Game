<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sky Fighter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at center, #0a1530 0%, #05070f 60%, #02030a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e8e8f0;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(56,189,248,0.08), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(168,85,247,0.06), transparent 40%);
    pointer-events: none;
    z-index: 0;
  }
  #wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hud {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    align-items: center;
    background: rgba(15,20,38,0.55);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 999px;
    padding: 8px 18px;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    font-size: 12.5px;
    font-weight: 600;
    color: #8b8ba8;
    letter-spacing: 0.6px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 92vw;
  }
  .hud-block {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hud-block .lbl { color: #6a6a85; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.2px; }
  .hud-block .val { color: #f0f0f8; font-weight: 700; font-size: 13.5px; }
  .hud-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.08); }
  #lives .val { color: #38bdf8; letter-spacing: 0; }
  #wave .val { color: #fbbf24; }
  #mods .val { color: #c084fc; font-family: "SF Mono", ui-monospace, monospace; font-size: 11.5px; letter-spacing: 0.8px; }
  canvas {
    display: block;
    border-radius: 14px;
    border: 1px solid rgba(125,211,252,0.12);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 0 60px rgba(56,189,248,0.18),
      0 24px 60px rgba(0,0,0,0.55);
    cursor: none;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,7,15,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    backdrop-filter: blur(8px);
    padding: 20px;
    z-index: 10;
  }
  #overlay h2 {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -1.5px;
    background: linear-gradient(135deg, #38bdf8 10%, #7dd3fc 55%, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
    text-shadow: 0 0 40px rgba(56,189,248,0.3);
  }
  #overlay p { color: #8888a0; font-size: 13px; text-align: center; line-height: 1.8; }
  #hi-score { font-size: 13px; color: #fbbf24; min-height: 18px; font-weight: 600; }
  #overlay button {
    margin-top: 10px;
    padding: 13px 42px;
    background: linear-gradient(135deg, #0ea5e9, #38bdf8 60%, #7dd3fc);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(56,189,248,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #overlay button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(56,189,248,0.6), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  #overlay.hidden { display: none; }
  #title-block { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #choice { display: none; flex-direction: column; align-items: center; gap: 14px; }
  #choice h2 {
    font-size: 28px;
    background: linear-gradient(135deg, #fbbf24, #fde68a, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(251,191,36,0.25);
  }
  #choice .sub { color: #8888a0; font-size: 12px; margin-top: -4px; }
  .cards { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; max-width: 540px; }
  .card {
    width: 154px;
    padding: 16px 14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    text-align: center;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, currentColor, transparent 60%);
    opacity: 0.08;
    pointer-events: none;
  }
  .card:hover { transform: translateY(-5px); }
  .card .icon {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1.5px;
    margin: 4px 0 8px;
    display: block;
    text-shadow: 0 0 16px currentColor;
  }
  .card .name { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: #e8e8f0; }
  .card .desc { font-size: 11px; color: #8888a0; line-height: 1.4; min-height: 32px; }
  .card .level { margin-top: 8px; font-size: 10px; color: #6b7280; letter-spacing: 1px; text-transform: uppercase; }
  .card .rare-tag { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.4px; }
  .card.common         { color: #94a3b8; border-color: rgba(148,163,184,0.4); }
  .card.common:hover   { box-shadow: 0 10px 32px rgba(148,163,184,0.25); border-color: #94a3b8; }
  .card.rare           { color: #38bdf8; border-color: rgba(56,189,248,0.5); }
  .card.rare:hover     { box-shadow: 0 10px 32px rgba(56,189,248,0.4); border-color: #7dd3fc; }
  .card.epic           { color: #c084fc; border-color: rgba(168,85,247,0.55); }
  .card.epic:hover     { box-shadow: 0 10px 32px rgba(168,85,247,0.5); border-color: #c084fc; }
</style>
</head>
<body>

<div id="wrap">
<div id="hud">
  <div class="hud-block"><span class="lbl">Score</span><span class="val" id="score">0</span></div>
  <div class="hud-sep"></div>
  <div class="hud-block" id="lives"><span class="lbl">Lives</span><span class="val" id="lives-val">✈ ✈ ✈</span></div>
  <div class="hud-sep"></div>
  <div class="hud-block" id="wave"><span class="lbl">Wave</span><span class="val" id="wave-val">1</span></div>
  <div class="hud-sep"></div>
  <div class="hud-block" id="mods"><span class="lbl">Mods</span><span class="val" id="mods-val">—</span></div>
</div>
<canvas id="c"></canvas>
</div>

<div id="overlay">
  <div id="title-block">
    <h2 id="ov-title">Sky Fighter</h2>
    <p id="ov-sub">Move: ←→↑↓ / WASD / Mouse<br>Bullets fire automatically · Survive waves and pick upgrades</p>
    <p id="hi-score"></p>
    <button id="ov-btn">Start Game</button>
  </div>
  <div id="choice">
    <h2 id="choice-title">Choose an Upgrade</h2>
    <p class="sub" id="choice-sub">Pick one mod to power up your fighter</p>
    <div class="cards" id="choice-cards"></div>
  </div>
</div>

<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const titleBlock  = document.getElementById('title-block');
const choiceBox   = document.getElementById('choice');
const choiceCards = document.getElementById('choice-cards');
const choiceTitle = document.getElementById('choice-title');
const choiceSub   = document.getElementById('choice-sub');
const ovTitle = document.getElementById('ov-title');
const ovSub   = document.getElementById('ov-sub');
const ovBtn   = document.getElementById('ov-btn');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives-val');
const waveEl  = document.getElementById('wave-val');
const modsEl  = document.getElementById('mods-val');
const hiEl    = document.getElementById('hi-score');

const CW = 480, CH = 640;
canvas.width = CW; canvas.height = CH;

// ── State ─────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | choosing | dead
let score = 0, lives = 3, wave = 1, hiScore = 0, rafId;

// ── Upgrades ──────────────────────────────────────────────────
const upgrades = {};
const UPGRADE_DEFS = [
  { id:'rapidFire',  name:'Rapid Fire',   icon:'RF',  desc:'+15% fire rate',           rarity:'common', max:6 },
  { id:'damage',     name:'Power Shot',   icon:'PWR', desc:'+1 bullet damage',          rarity:'common', max:5 },
  { id:'speed',      name:'Engine Boost', icon:'SPD', desc:'+12% move speed',           rarity:'common', max:4 },
  { id:'lucky',      name:'Lucky Find',   icon:'LCK', desc:'+12% drop rate',            rarity:'common', max:3 },
  { id:'multishot',  name:'Multi Shot',   icon:'MS',  desc:'+2 angled side bullets',    rarity:'rare',   max:3 },
  { id:'pierce',     name:'Piercing',     icon:'PRC', desc:'Bullets pierce +1 enemy',   rarity:'rare',   max:3 },
  { id:'crit',       name:'Critical',     icon:'CRT', desc:'+15% crit chance (×3 dmg)', rarity:'rare',   max:4 },
  { id:'shieldRegen',name:'Auto Shield',  icon:'SH',  desc:'Shield regenerates over time',rarity:'rare', max:2 },
  { id:'burn',       name:'Incendiary',   icon:'IGN', desc:'Bullets ignite enemies',    rarity:'rare',   max:2 },
  { id:'magnet',     name:'Magnet',       icon:'MAG', desc:'Attract nearby powerups',   rarity:'rare',   max:1 },
  { id:'homing',     name:'Smart Shot',   icon:'TRK', desc:'Bullets curve toward foes', rarity:'epic',   max:1 },
  { id:'lightning',  name:'Chain Bolt',   icon:'CHN', desc:'Hits chain to nearby foes', rarity:'epic',   max:2 },
  { id:'life',       name:'Spare Life',   icon:'L+',  desc:'+1 life',                   rarity:'epic',   max:99 },
];

function resetUpgrades() {
  for (const d of UPGRADE_DEFS) upgrades[d.id] = 0;
}

function updateModsHud() {
  const list = UPGRADE_DEFS
    .filter(d => upgrades[d.id] > 0 && d.id !== 'life')
    .map(d => `${d.icon}${upgrades[d.id] > 1 ? upgrades[d.id] : ''}`);
  modsEl.textContent = list.length ? list.join('  ') : '—';
}

// ── Stars (parallax + twinkle) ────────────────────────────────
const STARS = Array.from({ length: 200 }, () => {
  const layer = Math.random() < 0.5 ? 0 : Math.random() < 0.7 ? 1 : 2;
  const cfg = [
    { rMin:0.2, rMax:0.6,  spdMin:0.18, spdMax:0.45, aMin:0.12, aMax:0.32 },
    { rMin:0.4, rMax:1.0,  spdMin:0.55, spdMax:1.05, aMin:0.28, aMax:0.55 },
    { rMin:0.7, rMax:1.6,  spdMin:1.25, spdMax:2.10, aMin:0.50, aMax:0.95 },
  ][layer];
  const tint = Math.random();
  return {
    x: Math.random() * CW,
    y: Math.random() * CH,
    layer,
    r: cfg.rMin + Math.random() * (cfg.rMax - cfg.rMin),
    speed: cfg.spdMin + Math.random() * (cfg.spdMax - cfg.spdMin),
    baseAlpha: cfg.aMin + Math.random() * (cfg.aMax - cfg.aMin),
    color: tint < 0.7 ? '#ffffff' : tint < 0.88 ? '#bae6fd' : '#fbcfe8',
    twT: Math.random() * Math.PI * 2,
    twSpd: 0.015 + Math.random() * 0.04,
  };
});

// Slow-drifting nebulas for depth
const NEBULAS = [
  { x: CW * 0.25, y: CH * 0.22, r: 220, color: 'rgba(56,189,248,0.10)',  drift: 0.06 },
  { x: CW * 0.78, y: CH * 0.55, r: 240, color: 'rgba(168,85,247,0.08)',  drift: 0.04 },
  { x: CW * 0.40, y: CH * 0.85, r: 200, color: 'rgba(244,114,182,0.06)', drift: 0.05 },
];

// ── Player ────────────────────────────────────────────────────
const player = {
  x: CW / 2, y: CH - 90,
  prevX: CW / 2,
  rollT: 0,         // -1..1, smoothed lateral velocity for tilt
  w: 36, h: 44,
  baseSpd: 5.5,
  bullets: [],
  fireTimer: 0,
  invincible: 0,
  shield: 0,
  shieldRegenTimer: 0,
  trailTimer: 0,
};

// ── Game objects ──────────────────────────────────────────────
let enemies = [], eBullets = [], particles = [], powerups = [], lightningBolts = [], shockwaves = [];
let screenShake = 0, bossWarning = 0;

// ── Input ─────────────────────────────────────────────────────
const keys = {};
let mouseX = CW / 2, mouseY = CH - 90, useMouse = false;

window.addEventListener('keydown', e => { keys[e.key] = true;  useMouse = false; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (CW / r.width);
  mouseY = (e.clientY - r.top)  * (CH / r.height);
  useMouse = true;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - r.left) * (CW / r.width);
  mouseY = (e.touches[0].clientY - r.top)  * (CH / r.height);
  useMouse = true;
}, { passive: false });

// ── Stat helpers (depend on upgrades) ─────────────────────────
function fireCooldown() {
  return Math.max(3, Math.round(11 * Math.pow(0.85, upgrades.rapidFire)));
}
function bulletDmg(isCrit) {
  return (1 + upgrades.damage) * (isCrit ? 3 : 1);
}
function moveSpeed() {
  return player.baseSpd * Math.pow(1.12, upgrades.speed);
}

// ── Wave system ───────────────────────────────────────────────
let waveTimer = 0, waveSpawned = 0, waveCfg = null, bossAlive = false;

function waveCfgFor(w) {
  return {
    count:     Math.min(5 + w * 2, 30),
    speed:     1.2 + w * 0.14,
    hp:        2 + Math.floor(w / 2),
    canShoot:  w >= 3,
    shootRate: Math.max(50, 130 - w * 9),
    isBoss:    w % 5 === 0,
  };
}

function spawnWave() {
  waveCfg = waveCfgFor(wave);
  waveTimer = 0; waveSpawned = 0; bossAlive = false;
  if (waveCfg.isBoss) { spawnBoss(); bossAlive = true; bossWarning = 110; }
}

function spawnBoss() {
  enemies.push({
    x: CW / 2, y: -90,
    type: 'boss',
    hp: 100 + wave * 40, maxHp: 100 + wave * 40,
    spd: 1.1, w: 76, h: 62,
    fireTimer: 0, fireCooldown: 32, canShoot: true,
    sineT: 0,
    points: 6000 + wave * 600,
    burn: 0, hitFlash: 0,
  });
}

function spawnEnemy(type) {
  const cfg = waveCfg;
  const x = 36 + Math.random() * (CW - 72);
  let e = {
    x, y: -44, type,
    hp: cfg.hp, maxHp: cfg.hp,
    spd: cfg.speed + (Math.random() - 0.5) * 0.3,
    w: 28, h: 32,
    fireTimer: Math.floor(Math.random() * cfg.shootRate),
    fireCooldown: cfg.shootRate,
    canShoot: cfg.canShoot,
    sineT: Math.random() * Math.PI * 2,
    points: 100 * cfg.hp,
    color: '#f97316',
    burn: 0, hitFlash: 0,
  };
  if (type === 'fast') {
    e.spd *= 1.9;
    e.hp = 2 + Math.floor(wave / 4);
    e.maxHp = e.hp;
    e.color = '#f43f5e'; e.points = 120;
  } else if (type === 'heavy') {
    e.hp = cfg.hp * 4; e.maxHp = e.hp;
    e.w = 42; e.h = 48; e.spd *= 0.55;
    e.color = '#a855f7'; e.points = 450 * cfg.hp;
  }
  enemies.push(e);
}

function pickType() {
  const r = Math.random();
  if (wave <= 2) return 'basic';
  if (wave <= 4) return r < 0.65 ? 'basic' : 'fast';
  return r < 0.5 ? 'basic' : r < 0.78 ? 'fast' : 'heavy';
}

// ── Shoot ─────────────────────────────────────────────────────
function playerShoot() {
  const x = player.x, y = player.y - player.h / 2;
  const mk = (px, py, vx, vy, w, h, color) => {
    player.bullets.push({
      x: px, y: py, vx, vy, w, h, color,
      pierceLeft: upgrades.pierce,
      hits: null,
      homing: upgrades.homing > 0,
      trail: [],
    });
  };
  mk(x, y, 0, -13, 4, 14, '#7dd3fc');
  if (wave >= 4) {
    mk(x - 15, y + 10, 0, -12, 3, 11, '#bae6fd');
    mk(x + 15, y + 10, 0, -12, 3, 11, '#bae6fd');
  }
  if (wave >= 8) {
    mk(x - 28, y + 18, 0, -11, 3, 10, '#e0f2fe');
    mk(x + 28, y + 18, 0, -11, 3, 10, '#e0f2fe');
  }
  for (let i = 0; i < upgrades.multishot; i++) {
    const ang = (i + 1) * 0.18;
    const sp = 12;
    mk(x - 8 - i*6, y + 6 + i*3, -Math.sin(ang) * sp, -Math.cos(ang) * sp, 3, 10, '#a78bfa');
    mk(x + 8 + i*6, y + 6 + i*3,  Math.sin(ang) * sp, -Math.cos(ang) * sp, 3, 10, '#a78bfa');
  }
}

// ── Particles / FX ────────────────────────────────────────────
function boom(x, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1, decay: 0.022 + Math.random() * 0.02, r: 2 + Math.random()*3, color });
  }
}
function spark(x, y, color, n = 4) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 2.5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 0.8, decay: 0.06, r: 1.5, color });
  }
}
function shockwave(x, y, color, maxR = 50, life = 1) {
  shockwaves.push({ x, y, r: 4, maxR, color, life });
}
function shake(amount) { if (amount > screenShake) screenShake = amount; }

function tryDropPowerup(x, y) {
  const rate = 0.28 + upgrades.lucky * 0.12;
  if (Math.random() > rate) return;
  powerups.push({ x, y, vy: 1.4, t: Math.random() * Math.PI * 2,
    type: Math.random() < 0.55 ? 'shield' : 'score' });
}

// ── Hit player ────────────────────────────────────────────────
function hitPlayer() {
  if (player.invincible > 0) return;
  if (player.shield > 0) {
    boom(player.x, player.y, '#06d6a0', 12);
    shockwave(player.x, player.y, '#06d6a0', 60);
    shake(4);
    player.shield = 0;
    player.shieldRegenTimer = 0;
    return;
  }
  boom(player.x, player.y, '#f97316', 22);
  shockwave(player.x, player.y, '#f97316', 80);
  shake(10);
  lives--;
  updateHud();
  player.invincible = 130;
  if (lives <= 0) state = 'dead';
}

// ── Chain lightning ───────────────────────────────────────────
function chainLightning(source, count) {
  let from = source;
  const visited = new Set([source]);
  for (let k = 0; k < count; k++) {
    let nearest = null, nd = 130;
    for (const e of enemies) {
      if (visited.has(e)) continue;
      const d = Math.hypot(from.x - e.x, from.y - e.y);
      if (d < nd) { nd = d; nearest = e; }
    }
    if (!nearest) break;
    lightningBolts.push({ x1: from.x, y1: from.y, x2: nearest.x, y2: nearest.y, life: 12 });
    nearest.hp -= 1 + upgrades.damage;
    nearest.hitFlash = 6;
    spark(nearest.x, nearest.y, '#fde047', 6);
    visited.add(nearest);
    from = nearest;
    if (nearest.hp <= 0) {
      const idx = enemies.indexOf(nearest);
      if (idx >= 0) killEnemy(idx, nearest);
    }
  }
}

// ── Update ────────────────────────────────────────────────────
function updateStars() {
  for (const s of STARS) {
    s.y += s.speed;
    s.twT += s.twSpd;
    if (s.y > CH) { s.y = -2; s.x = Math.random() * CW; }
  }
  // Subtle nebula drift
  for (const n of NEBULAS) {
    n.y += n.drift;
    if (n.y > CH + n.r) n.y = -n.r;
  }
}

function updatePlayer() {
  const spd = moveSpeed();
  player.prevX = player.x;
  if (useMouse) {
    player.x += (mouseX - player.x) * 0.16;
    player.y += (mouseY - player.y) * 0.16;
  } else {
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) player.x -= spd;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += spd;
    if (keys['ArrowUp']    || keys['w'] || keys['W']) player.y -= spd;
    if (keys['ArrowDown']  || keys['s'] || keys['S']) player.y += spd;
  }
  player.x = Math.max(player.w/2, Math.min(CW - player.w/2, player.x));
  player.y = Math.max(player.h/2 + 28, Math.min(CH - player.h/2, player.y));

  // Smoothed roll target based on horizontal velocity
  const vx = player.x - player.prevX;
  const target = Math.max(-1, Math.min(1, vx / 4));
  player.rollT += (target - player.rollT) * 0.22;

  player.fireTimer++;
  if (player.fireTimer >= fireCooldown()) { playerShoot(); player.fireTimer = 0; }

  // Engine trail particles
  player.trailTimer++;
  if (player.trailTimer >= 2 && player.invincible <= 0) {
    player.trailTimer = 0;
    particles.push({
      x: player.x + (Math.random() - 0.5) * 4,
      y: player.y + player.h/2 + 2,
      vx: (Math.random() - 0.5) * 0.3 + vx * 0.2,
      vy: 1.6 + Math.random() * 0.6,
      life: 0.55, decay: 0.05,
      r: 1.4 + Math.random() * 0.8,
      color: '#0ea5e9',
    });
  }

  if (player.invincible > 0) player.invincible--;
  if (player.shield > 0)     player.shield--;

  if (upgrades.shieldRegen > 0 && player.shield <= 0) {
    player.shieldRegenTimer++;
    const interval = Math.round(720 / upgrades.shieldRegen);
    if (player.shieldRegenTimer >= interval) {
      player.shieldRegenTimer = 0;
      player.shield = 320;
      spark(player.x, player.y, '#06d6a0', 10);
      shockwave(player.x, player.y, '#06d6a0', 50, 0.7);
    }
  }
}

function updatePlayerBullets() {
  for (let i = player.bullets.length - 1; i >= 0; i--) {
    const b = player.bullets[i];

    if (b.homing && enemies.length > 0) {
      let nearest = null, nd = Infinity;
      for (const e of enemies) {
        if (e.y < -10) continue;
        const d = Math.hypot(b.x - e.x, b.y - e.y);
        if (d < nd) { nd = d; nearest = e; }
      }
      if (nearest) {
        const dx = nearest.x - b.x, dy = nearest.y - b.y;
        const d = Math.hypot(dx, dy) || 1;
        const sp = Math.hypot(b.vx, b.vy) || 12;
        const tx = dx/d * sp, ty = dy/d * sp;
        const turn = 0.16;
        b.vx = b.vx * (1-turn) + tx * turn;
        b.vy = b.vy * (1-turn) + ty * turn;
      }
    }

    // Trail history (max 4)
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 4) b.trail.shift();

    b.x += b.vx;
    b.y += b.vy;
    if (b.y < -20 || b.y > CH + 20 || b.x < -20 || b.x > CW + 20) {
      player.bullets.splice(i, 1); continue;
    }

    let removed = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (b.hits && b.hits.has(e)) continue;
      if (circRectsOverlap(b.x, b.y, e.x, e.y, Math.max(e.w, e.h) / 2 + 4)) {
        const isCrit = upgrades.crit > 0 && Math.random() < upgrades.crit * 0.15;
        const dmg = bulletDmg(isCrit);
        e.hp -= dmg;
        e.hitFlash = isCrit ? 9 : 5;
        spark(b.x, b.y, isCrit ? '#fbbf24' : '#7dd3fc', isCrit ? 10 : 4);
        if (isCrit) shockwave(e.x, e.y, '#fbbf24', 40, 0.7);
        if (upgrades.burn > 0) {
          e.burn = Math.max(e.burn, 80 + upgrades.burn * 60);
        }
        if (upgrades.lightning > 0 && Math.random() < 0.5) {
          chainLightning(e, upgrades.lightning + 1);
        }
        if (!b.hits) b.hits = new Set();
        b.hits.add(e);
        if (e.hp <= 0) killEnemy(j, e);
        if (b.pierceLeft > 0) {
          b.pierceLeft--;
        } else {
          player.bullets.splice(i, 1);
          removed = true;
        }
        break;
      }
    }
    if (removed) continue;
  }
}

function killEnemy(idx, e) {
  const isBoss = e.type === 'boss';
  boom(e.x, e.y, isBoss ? '#ef4444' : e.color, isBoss ? 40 : 14);
  shockwave(e.x, e.y, isBoss ? '#ef4444' : e.color, isBoss ? 140 : 55, isBoss ? 1.2 : 0.8);
  if (isBoss) shake(14); else shake(2);
  tryDropPowerup(e.x, e.y);
  score += e.points;
  scoreEl.textContent = score;
  enemies.splice(idx, 1);
  if (isBoss) {
    bossAlive = false;
    wave++;
    waveEl.textContent = wave;
    waveCfg = null;
    setTimeout(() => triggerUpgradeChoice('rare'), 700);
  }
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.sineT += 0.04;
    if (e.hitFlash > 0) e.hitFlash--;

    if (e.burn > 0) {
      e.burn--;
      if (e.burn % 18 === 0) {
        e.hp -= upgrades.burn || 1;
        spark(e.x, e.y, '#f97316', 2);
        if (e.hp <= 0) { killEnemy(i, e); continue; }
      }
    }

    if (e.type === 'boss') {
      e.x = CW/2 + Math.sin(e.sineT * 0.45) * (CW/2 - e.w/2 - 16);
      if (e.y < 85) e.y += e.spd;
    } else {
      e.y += e.spd;
      e.x += Math.sin(e.sineT) * (e.type === 'fast' ? 2.8 : 1.6);
    }

    if (e.y > CH + 60) { enemies.splice(i, 1); continue; }

    if (e.canShoot) {
      e.fireTimer++;
      if (e.fireTimer >= e.fireCooldown) {
        e.fireTimer = 0;
        if (e.type === 'boss') {
          for (let k = -1; k <= 1; k++) {
            eBullets.push({ x: e.x + k * 22, y: e.y + e.h/2,
              vx: k * 1.6, vy: 4.2, r: 5, color: '#ef4444' });
          }
        } else {
          const dx = player.x - e.x, dy = player.y - e.y;
          const d = Math.hypot(dx, dy) || 1;
          const spd = 3.8;
          eBullets.push({ x: e.x, y: e.y + e.h/2,
            vx: dx/d * spd, vy: dy/d * spd, r: 4, color: '#fb923c' });
        }
      }
    }

    if (player.invincible <= 0) {
      if (circRectsOverlap(player.x, player.y, e.x, e.y, Math.max(e.w,e.h)/2 + 14)) {
        hitPlayer();
        if (e.type !== 'boss') { boom(e.x, e.y, e.color, 10); enemies.splice(i, 1); }
      }
    }
  }
}

function updateEBullets() {
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > CH + 20 || b.x < -20 || b.x > CW + 20) { eBullets.splice(i, 1); continue; }
    if (player.invincible <= 0) {
      if (Math.hypot(b.x - player.x, b.y - player.y) < b.r + 13) {
        eBullets.splice(i, 1);
        hitPlayer();
      }
    }
  }
}

function updatePowerups() {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.t += 0.08;
    if (upgrades.magnet > 0) {
      const dx = player.x - p.x, dy = player.y - p.y;
      const d = Math.hypot(dx, dy);
      if (d < 140 && d > 0) {
        p.x += dx/d * 4;
        p.y += dy/d * 4;
      }
    }
    p.y += p.vy;
    if (p.y > CH + 20) { powerups.splice(i, 1); continue; }
    if (Math.hypot(p.x - player.x, p.y - player.y) < 22) {
      if (p.type === 'shield') player.shield = 320;
      else { score += 500; scoreEl.textContent = score; }
      const c = p.type === 'shield' ? '#06d6a0' : '#fbbf24';
      boom(p.x, p.y, c, 12);
      shockwave(p.x, p.y, c, 45, 0.7);
      powerups.splice(i, 1);
    }
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
  }
}

function updateLightning() {
  for (let i = lightningBolts.length - 1; i >= 0; i--) {
    lightningBolts[i].life--;
    if (lightningBolts[i].life <= 0) lightningBolts.splice(i, 1);
  }
}

function updateShockwaves() {
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.r += (s.maxR - s.r) * 0.18;
    s.life -= 0.06;
    if (s.life <= 0) shockwaves.splice(i, 1);
  }
}

function updateWaveSpawner() {
  if (bossWarning > 0) bossWarning--;
  if (bossAlive || !waveCfg) return;
  waveTimer++;
  if (waveSpawned < waveCfg.count && waveTimer % 20 === 0) {
    spawnEnemy(pickType());
    waveSpawned++;
  }
  if (waveSpawned >= waveCfg.count && enemies.length === 0) {
    wave++; waveEl.textContent = wave;
    waveCfg = null;
    setTimeout(() => triggerUpgradeChoice('common'), 600);
  }
}

function circRectsOverlap(ax, ay, bx, by, threshold) {
  return Math.hypot(ax - bx, ay - by) < threshold;
}

function updateHud() {
  livesEl.textContent = lives > 0 ? '✈ '.repeat(lives).trim() : '—';
}

// ── Draw ──────────────────────────────────────────────────────
function drawBackground() {
  // Base radial vignette
  const g = ctx.createRadialGradient(CW/2, CH/2, 0, CW/2, CH/2, CH * 0.85);
  g.addColorStop(0, '#0a1530');
  g.addColorStop(0.55, '#06091a');
  g.addColorStop(1, '#02030a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, CW, CH);

  // Soft drifting nebulas
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const n of NEBULAS) {
    const ng = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    ng.addColorStop(0, n.color);
    ng.addColorStop(1, 'transparent');
    ctx.fillStyle = ng;
    ctx.fillRect(0, 0, CW, CH);
  }
  ctx.restore();
}

function drawStars() {
  for (const s of STARS) {
    const tw = 0.7 + 0.3 * Math.sin(s.twT);
    const a = s.baseAlpha * tw;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = s.color;
    if (s.layer >= 1) {
      ctx.shadowColor = s.color;
      ctx.shadowBlur = s.layer === 2 ? 6 : 3;
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer() {
  const { x, y, w, h, invincible, shield } = player;
  if (invincible > 0 && Math.floor(invincible / 4) % 2 === 0) return;

  ctx.save();
  ctx.translate(x, y);

  // Subtle shadow under ship
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, h/2 + 4, w/2, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Twin engine flames (flicker)
  for (const dx of [-9, 9]) {
    const flameH = 12 + Math.random() * 9;
    const fg = ctx.createLinearGradient(0, h/2 - 2, 0, h/2 + flameH);
    fg.addColorStop(0, 'rgba(254,240,138,0.95)');
    fg.addColorStop(0.4, 'rgba(249,115,22,0.85)');
    fg.addColorStop(1, 'rgba(249,115,22,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.ellipse(dx, h/2 + flameH/2 - 2, 4, flameH/2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Apply roll (skew + slight rotate) for direction tilt
  ctx.transform(1, 0, -player.rollT * 0.22, 1, 0, 0);
  ctx.rotate(player.rollT * 0.06);

  // Body glow
  ctx.shadowColor = '#38bdf8';
  ctx.shadowBlur = 22;

  // Main body
  const bodyG = ctx.createLinearGradient(0, -h/2, 0, h/2);
  bodyG.addColorStop(0, '#bae6fd');
  bodyG.addColorStop(0.4, '#38bdf8');
  bodyG.addColorStop(1, '#075985');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(0, -h/2);
  ctx.lineTo(w/2, h/4);
  ctx.lineTo(w/3, h/2);
  ctx.lineTo(-w/3, h/2);
  ctx.lineTo(-w/2, h/4);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.shadowBlur = 8;
  const wingG = ctx.createLinearGradient(-w, 0, w, 0);
  wingG.addColorStop(0, '#0ea5e9');
  wingG.addColorStop(0.5, '#22d3ee');
  wingG.addColorStop(1, '#0ea5e9');
  ctx.fillStyle = wingG;
  ctx.beginPath();
  ctx.moveTo(-w/2, h/4);
  ctx.lineTo(-w * 0.95, h/2 + 5);
  ctx.lineTo(-w * 0.7, h/2 + 5);
  ctx.lineTo(-w/5, h/8);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w/2, h/4);
  ctx.lineTo(w * 0.95, h/2 + 5);
  ctx.lineTo(w * 0.7, h/2 + 5);
  ctx.lineTo(w/5, h/8);
  ctx.closePath();
  ctx.fill();

  // Hull highlight stripe
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.moveTo(0, -h/2 + 4);
  ctx.lineTo(w/8, h/4);
  ctx.lineTo(-w/8, h/4);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  const cockG = ctx.createRadialGradient(0, -h/9, 1, 0, -h/9, w/6);
  cockG.addColorStop(0, 'rgba(255,255,255,0.95)');
  cockG.addColorStop(0.6, 'rgba(125,211,252,0.6)');
  cockG.addColorStop(1, 'rgba(2,132,199,0.2)');
  ctx.fillStyle = cockG;
  ctx.beginPath();
  ctx.ellipse(0, -h/9, w/8, h/5.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing tip lights
  ctx.fillStyle = '#fde047';
  ctx.shadowColor = '#fde047';
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(-w * 0.85, h/2 + 3, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( w * 0.85, h/2 + 3, 1.6, 0, Math.PI * 2); ctx.fill();

  // Shield ring
  if (shield > 0) {
    const pulse = 0.4 + 0.3 * Math.sin(Date.now() / 160);
    ctx.shadowColor = '#06d6a0';
    ctx.shadowBlur = 22;
    ctx.strokeStyle = `rgba(6,214,160,${pulse})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.85, 0, Math.PI * 2);
    ctx.stroke();
    // Inner highlight
    ctx.strokeStyle = `rgba(167,243,208,${pulse * 0.6})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.7, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.type === 'boss') {
    ctx.shadowColor = '#ef4444';
    ctx.shadowBlur = 22;
    const g = ctx.createLinearGradient(0, -e.h/2, 0, e.h/2);
    g.addColorStop(0, '#fca5a5');
    g.addColorStop(0.45, '#ef4444');
    g.addColorStop(1, '#7f1d1d');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(e.w/2, -e.h/6);
    ctx.lineTo(e.w * 0.75, -e.h/2);
    ctx.lineTo(0, -e.h/3.5);
    ctx.lineTo(-e.w * 0.75, -e.h/2);
    ctx.lineTo(-e.w/2, -e.h/6);
    ctx.closePath();
    ctx.fill();

    // Boss core
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#fee2e2';
    ctx.beginPath();
    ctx.arc(0, -e.h/8, 6, 0, Math.PI * 2);
    ctx.fill();

    // Highlight stripe
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(e.w/4, -e.h/6);
    ctx.lineTo(-e.w/4, -e.h/6);
    ctx.closePath();
    ctx.fill();

    // HP bar
    const barW = 100;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.roundRect(-barW/2 - 1, -e.h/2 - 16, barW + 2, 7, 4); ctx.fill();
    ctx.fillStyle = '#1e1e2e';
    ctx.beginPath(); ctx.roundRect(-barW/2, -e.h/2 - 15, barW, 5, 3); ctx.fill();
    const hpFrac = Math.max(0, e.hp / e.maxHp);
    const hpG = ctx.createLinearGradient(-barW/2, 0, -barW/2 + barW * hpFrac, 0);
    hpG.addColorStop(0, '#fca5a5');
    hpG.addColorStop(1, '#ef4444');
    ctx.fillStyle = hpG;
    ctx.beginPath(); ctx.roundRect(-barW/2, -e.h/2 - 15, barW * hpFrac, 5, 3); ctx.fill();
    ctx.fillStyle = 'rgba(254,202,202,0.85)';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', 0, -e.h/2 - 22);
  } else {
    ctx.rotate(Math.PI);
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 14;
    const g = ctx.createLinearGradient(0, -e.h/2, 0, e.h/2);
    g.addColorStop(0, e.color);
    g.addColorStop(1, e.type === 'heavy' ? '#581c87' : e.type === 'fast' ? '#881337' : '#7c2d12');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, -e.h/2);
    ctx.lineTo(e.w/2, e.h/3);
    ctx.lineTo(e.w/3, e.h/2);
    ctx.lineTo(-e.w/3, e.h/2);
    ctx.lineTo(-e.w/2, e.h/3);
    ctx.closePath();
    ctx.fill();
    // Wings
    ctx.fillStyle = e.type === 'heavy' ? '#7c3aed' : e.type === 'fast' ? '#e11d48' : '#b91c1c';
    ctx.beginPath();
    ctx.moveTo(-e.w/2, e.h/3);
    ctx.lineTo(-e.w * 0.92, e.h/2 + 4);
    ctx.lineTo(-e.w * 0.7, e.h/2 + 3);
    ctx.lineTo(-e.w/4, e.h/7);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(e.w/2, e.h/3);
    ctx.lineTo(e.w * 0.92, e.h/2 + 4);
    ctx.lineTo(e.w * 0.7, e.h/2 + 3);
    ctx.lineTo(e.w/4, e.h/7);
    ctx.closePath(); ctx.fill();
    // Cockpit dot
    ctx.shadowBlur = 6;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.ellipse(0, -e.h/8, e.w/9, e.h/7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Small HP bar for heavy
    if (e.type === 'heavy' && e.hp < e.maxHp) {
      ctx.shadowBlur = 0;
      const bw = 28;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(-bw/2, e.h/2 + 6, bw, 3);
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(-bw/2, e.h/2 + 6, bw * (e.hp / e.maxHp), 3);
    }
  }

  ctx.restore();

  // Hit flash overlay
  if (e.hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, e.hitFlash / 6) * 0.85;
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(e.x, e.y, Math.max(e.w, e.h) / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Burning embers
  if (e.burn > 0 && e.type !== 'boss') {
    ctx.save();
    ctx.globalAlpha = 0.55 + 0.4 * Math.sin(Date.now() / 80);
    ctx.shadowColor = '#f97316';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#fb923c';
    ctx.beginPath();
    ctx.arc(e.x + (Math.random() - 0.5) * 6, e.y - e.h/3 + (Math.random() - 0.5) * 4, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBullet(b) {
  const ang = Math.atan2(b.vy, b.vx) + Math.PI/2;

  // Tail trail
  ctx.save();
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 8;
  for (let i = 0; i < b.trail.length; i++) {
    const t = b.trail[i];
    const a = (i + 1) / b.trail.length * 0.5;
    ctx.globalAlpha = a;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(t.x, t.y, b.w * 0.6 * (i + 1) / b.trail.length, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Main bullet body
  ctx.save();
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 14;
  ctx.translate(b.x, b.y);
  ctx.rotate(ang);
  // Outer glow
  const og = ctx.createLinearGradient(0, -b.h/2, 0, b.h/2);
  og.addColorStop(0, '#ffffff');
  og.addColorStop(0.5, b.color);
  og.addColorStop(1, b.color);
  ctx.fillStyle = og;
  ctx.beginPath();
  ctx.roundRect(-b.w/2, -b.h/2, b.w, b.h, b.w/2);
  ctx.fill();
  // Inner core
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.roundRect(-b.w/4, -b.h/2 + 1, b.w/2, b.h - 2, b.w/4);
  ctx.fill();
  ctx.restore();
}

function drawEBullet(b) {
  ctx.save();
  ctx.shadowColor = b.color; ctx.shadowBlur = 14;
  // Outer
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();
  // Hot core
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff5e6';
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPowerup(p) {
  const isShield = p.type === 'shield';
  const color = isShield ? '#06d6a0' : '#fbbf24';
  const lightColor = isShield ? '#a7f3d0' : '#fef3c7';
  const float = Math.sin(p.t * 1.6) * 2;
  const rot = p.t * 0.6;

  ctx.save();
  ctx.translate(p.x, p.y + float);

  // Outer halo
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.globalAlpha = 0.35 + 0.2 * Math.sin(p.t * 3);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Hexagon shell
  ctx.rotate(rot);
  ctx.lineWidth = 2;
  ctx.strokeStyle = color;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = i / 6 * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(a) * 11, y = Math.sin(a) * 11;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();

  // Inner fill
  const ig = ctx.createRadialGradient(0, 0, 1, 0, 0, 11);
  ig.addColorStop(0, lightColor);
  ig.addColorStop(1, color);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = ig;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = i / 6 * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(a) * 11, y = Math.sin(a) * 11;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Inner glyph (counter-rotate so it stays upright)
  ctx.rotate(-rot);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  if (isShield) {
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.lineTo(4.5, -3);
    ctx.lineTo(4.5, 2);
    ctx.lineTo(0, 6);
    ctx.lineTo(-4.5, 2);
    ctx.lineTo(-4.5, -3);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillRect(-1.5, -5.5, 3, 11);
    ctx.fillRect(-5.5, -1.5, 11, 3);
  }

  ctx.restore();
}

function drawLightning() {
  for (const lb of lightningBolts) {
    const a = Math.max(0, lb.life / 12);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = '#fde047';
    ctx.shadowBlur = 16;
    // Outer glow stroke
    ctx.strokeStyle = 'rgba(253,224,71,0.45)';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(lb.x1, lb.y1);
    ctx.lineTo(lb.x2, lb.y2);
    ctx.stroke();
    // Jagged core
    ctx.strokeStyle = '#fefce8';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    const segs = 6;
    ctx.moveTo(lb.x1, lb.y1);
    for (let i = 1; i < segs; i++) {
      const t = i / segs;
      const nx = lb.x1 + (lb.x2 - lb.x1) * t + (Math.random() - 0.5) * 16;
      const ny = lb.y1 + (lb.y2 - lb.y1) * t + (Math.random() - 0.5) * 16;
      ctx.lineTo(nx, ny);
    }
    ctx.lineTo(lb.x2, lb.y2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawShockwaves() {
  for (const s of shockwaves) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 14;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.stroke();
    // Inner faded ring
    ctx.globalAlpha = Math.max(0, s.life * 0.4);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 0.78, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawWaveProgress() {
  if (!waveCfg) return;
  const barX = 14, barY = 10, barW = CW - 28, barH = 4;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 2); ctx.fill();

  let prog;
  let isBossBar = false;
  const boss = enemies.find(e => e.type === 'boss');
  if (boss) {
    prog = 1 - boss.hp / boss.maxHp;
    isBossBar = true;
  } else {
    const killed = waveSpawned - enemies.length;
    prog = waveCfg.count > 0 ? killed / waveCfg.count : 0;
  }
  prog = Math.max(0, Math.min(1, prog));

  const colA = isBossBar ? '#ef4444' : '#38bdf8';
  const colB = isBossBar ? '#fca5a5' : '#7dd3fc';
  const g = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  g.addColorStop(0, colA);
  g.addColorStop(1, colB);
  ctx.shadowColor = colA;
  ctx.shadowBlur = 8;
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.roundRect(barX, barY, barW * prog, barH, 2); ctx.fill();
  ctx.restore();
}

function drawBossWarning() {
  if (bossWarning <= 0) return;
  const a = (Math.sin(bossWarning * 0.4) * 0.5 + 0.5) * Math.min(1, bossWarning / 30);
  ctx.save();
  ctx.globalAlpha = a;
  // Side bands
  const bandG = ctx.createLinearGradient(0, 0, 0, CH);
  bandG.addColorStop(0, 'rgba(239,68,68,0.45)');
  bandG.addColorStop(0.5, 'rgba(239,68,68,0)');
  bandG.addColorStop(1, 'rgba(239,68,68,0.45)');
  ctx.fillStyle = bandG;
  ctx.fillRect(0, 0, 14, CH);
  ctx.fillRect(CW - 14, 0, 14, CH);

  // Warning text
  ctx.shadowColor = '#ef4444';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#fee2e2';
  ctx.font = '900 22px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('!! BOSS APPROACHING !!', CW / 2, CH / 2 - 80);
  ctx.font = '600 11px sans-serif';
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(254,226,226,0.7)';
  ctx.fillText(`WAVE ${wave}`, CW / 2, CH / 2 - 60);
  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────
function render() {
  ctx.save();
  if (screenShake > 0.3) {
    const dx = (Math.random() - 0.5) * screenShake;
    const dy = (Math.random() - 0.5) * screenShake;
    ctx.translate(dx, dy);
    screenShake *= 0.86;
  } else {
    screenShake = 0;
  }

  drawBackground();
  drawStars();
  for (const p of powerups)       drawPowerup(p);
  drawShockwaves();
  for (const b of player.bullets) drawBullet(b);
  for (const b of eBullets)       drawEBullet(b);
  for (const e of enemies)        drawEnemy(e);
  drawLightning();
  drawParticles();
  if (state === 'playing' || state === 'choosing') drawPlayer();

  ctx.restore();

  // UI elements drawn unshaken
  drawWaveProgress();
  drawBossWarning();
}

function update() {
  if (state !== 'playing') return;
  updatePlayer();
  updatePlayerBullets();
  updateEnemies();
  updateEBullets();
  updatePowerups();
  updateLightning();
  updateShockwaves();
  updateParticles();
  updateWaveSpawner();
}

const STEP_MS = 1000 / 60;
const MAX_STEPS_PER_FRAME = 5;
let lastTime = 0, accumulator = 0;

function loop(now) {
  now = now || performance.now();
  let dt = now - lastTime;
  lastTime = now;
  if (dt > 250) dt = STEP_MS;
  accumulator += dt;
  let steps = 0;
  while (accumulator >= STEP_MS && steps < MAX_STEPS_PER_FRAME) {
    updateStars();
    update();
    accumulator -= STEP_MS;
    steps++;
    if (state === 'dead' || state === 'choosing') { accumulator = 0; break; }
  }
  if (accumulator > STEP_MS * MAX_STEPS_PER_FRAME) accumulator = 0;
  render();
  if (state === 'dead') {
    if (score > hiScore) hiScore = score;
    titleBlock.style.display = '';
    choiceBox.style.display = 'none';
    ovTitle.textContent = 'Game Over';
    ovSub.innerHTML  = `Score: ${score.toLocaleString()}<br>Reached Wave ${wave}`;
    hiEl.textContent = hiScore > 0 ? `Best: ${hiScore.toLocaleString()}` : '';
    ovBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
    return;
  }
  if (state === 'choosing') return;
  rafId = requestAnimationFrame(loop);
}

function restartLoopClock() {
  lastTime = performance.now();
  accumulator = 0;
}

// ── Upgrade choice ────────────────────────────────────────────
function triggerUpgradeChoice(rarityFloor) {
  const pool = UPGRADE_DEFS.filter(d => upgrades[d.id] < d.max);
  if (pool.length === 0) {
    setTimeout(spawnWave, 400);
    return;
  }
  const weights = rarityFloor === 'rare'
    ? { common: 0,  rare: 60, epic: 40 }
    : { common: 60, rare: 30, epic: 10 };

  const picks = [];
  const remaining = pool.slice();
  for (let n = 0; n < 3 && remaining.length; n++) {
    let total = 0;
    for (const d of remaining) total += weights[d.rarity];
    let chosenIdx;
    if (total === 0) {
      chosenIdx = Math.floor(Math.random() * remaining.length);
    } else {
      let r = Math.random() * total;
      chosenIdx = 0;
      for (let i = 0; i < remaining.length; i++) {
        r -= weights[remaining[i].rarity];
        if (r <= 0) { chosenIdx = i; break; }
      }
    }
    picks.push(remaining.splice(chosenIdx, 1)[0]);
  }

  state = 'choosing';
  showChoiceUI(picks, rarityFloor === 'rare');
}

function showChoiceUI(picks, fromBoss) {
  titleBlock.style.display = 'none';
  choiceBox.style.display = 'flex';
  choiceTitle.textContent = fromBoss ? 'Boss Reward!' : `Wave ${wave - 1} Cleared`;
  choiceSub.textContent   = fromBoss ? 'Pick a powerful upgrade' : 'Choose one mod to power up your fighter';
  choiceCards.innerHTML = '';
  picks.forEach(def => {
    const cur = upgrades[def.id];
    const card = document.createElement('div');
    card.className = `card ${def.rarity}`;
    const lvlText = def.id === 'life'
      ? 'instant'
      : (cur === 0 ? 'new' : `lv ${cur} → ${cur + 1}`);
    card.innerHTML = `
      <div class="rare-tag">${def.rarity}</div>
      <span class="icon">${def.icon}</span>
      <div class="name">${def.name}</div>
      <div class="desc">${def.desc}</div>
      <div class="level">${lvlText}</div>
    `;
    card.addEventListener('click', () => applyUpgrade(def));
    choiceCards.appendChild(card);
  });
  overlay.classList.remove('hidden');
}

function applyUpgrade(def) {
  if (def.id === 'life') {
    lives = Math.min(lives + 1, 8);
    updateHud();
  } else {
    upgrades[def.id]++;
  }
  updateModsHud();
  overlay.classList.add('hidden');
  choiceBox.style.display = 'none';
  titleBlock.style.display = '';
  state = 'playing';
  if (waveCfg === null) setTimeout(spawnWave, 400);
  if (rafId) cancelAnimationFrame(rafId);
  restartLoopClock();
  loop();
}

function startGame() {
  resetUpgrades();
  score = 0; lives = 3; wave = 1;
  player.x = CW/2; player.y = CH - 90;
  player.prevX = player.x;
  player.rollT = 0;
  player.bullets = []; player.fireTimer = 0;
  player.invincible = 0; player.shield = 0; player.shieldRegenTimer = 0;
  player.trailTimer = 0;
  enemies = []; eBullets = []; particles = []; powerups = [];
  lightningBolts = []; shockwaves = [];
  screenShake = 0; bossWarning = 0;
  scoreEl.textContent = '0';
  waveEl.textContent  = '1';
  updateHud();
  updateModsHud();
  spawnWave();
  overlay.classList.add('hidden');
  choiceBox.style.display = 'none';
  titleBlock.style.display = '';
  state = 'playing';
  if (rafId) cancelAnimationFrame(rafId);
  restartLoopClock();
  loop();
}

ovBtn.addEventListener('click', startGame);

// ── Idle attract loop (animate background on title screen) ────
function idleLoop() {
  if (state !== 'idle') return;
  updateStars();
  drawBackground();
  drawStars();
  requestAnimationFrame(idleLoop);
}

// Initial frame
resetUpgrades();
drawBackground();
drawStars();
idleLoop();
</script>
