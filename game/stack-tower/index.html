<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Stack Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c1220;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
      touch-action: none;
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      z-index: 2;
    }
    .hud-block { text-align: center; }
    .hud-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .hud-value { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.1; }

    #game-area {
      position: relative;
      width: 100%;
      max-width: 480px;
      flex: 1;
      overflow: hidden;
      cursor: pointer;
    }

    canvas { display: block; width: 100%; height: 100%; }

    /* ── screens ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      background: rgba(12,18,32,0.88);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .screen.hidden { display: none; }

    .screen h2 {
      font-size: 32px; font-weight: 800;
      color: #fff; letter-spacing: 1px;
    }
    .screen p {
      font-size: 14px; color: rgba(255,255,255,0.5);
      text-align: center; max-width: 260px; line-height: 1.7;
    }
    .big-score {
      font-size: 56px; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #34d399, #a7f3d0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .btn-play {
      padding: 13px 38px; border: none; border-radius: 50px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #34d399, #6ee7b7);
      color: #0c1220;
      box-shadow: 0 0 22px rgba(52,211,153,0.4);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(52,211,153,0.6); }
    .btn-play:active { transform: scale(0.97); }

    /* perfect flash overlay */
    #perfect-flash {
      position: absolute; inset: 0; z-index: 8;
      background: rgba(52,211,153,0.18);
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="score-val">0</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Perfect</div>
    <div class="hud-value" id="perfect-val">0</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Best</div>
    <div class="hud-value" id="best-val">0</div>
  </div>
</div>

<div id="game-area">
  <canvas id="canvas"></canvas>
  <div id="perfect-flash"></div>

  <!-- Start -->
  <div class="screen" id="screen-start">
    <h2>Stack Logs</h2>
    <p>Tap to stack each log.<br>The wider your stack, the higher you climb!</p>
    <p style="font-size:12px;color:rgba(255,255,255,0.28)">Perfect align = extra points + width bonus</p>
    <button class="btn-play" id="btn-start">▶ Start</button>
  </div>

  <!-- Over -->
  <div class="screen hidden" id="screen-over">
    <h2>Game Over</h2>
    <div class="big-score" id="final-score">0</div>
    <p id="over-msg"></p>
    <button class="btn-play" id="btn-restart">↺ Play Again</button>
  </div>
</div>

<script>
(() => {
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d');
  const area      = document.getElementById('game-area');
  const scoreEl   = document.getElementById('score-val');
  const perfectEl = document.getElementById('perfect-val');
  const bestEl    = document.getElementById('best-val');
  const finalEl   = document.getElementById('final-score');
  const overMsg   = document.getElementById('over-msg');
  const scrStart  = document.getElementById('screen-start');
  const scrOver   = document.getElementById('screen-over');
  const flash     = document.getElementById('perfect-flash');

  let W, H, running = false, raf;

  /* ── config ──────────────────────────── */
  const BLOCK_H     = 28;       // block height px (logical)
  const BASE_W      = 220;      // starting block width
  const MIN_W       = 18;       // game over below this
  const PERFECT_TOL = 6;        // px tolerance for perfect
  const SPEED_BASE  = 3.2;
  const SPEED_MAX   = 9.0;
  const VIEW_SLACK  = 6;        // extra blocks shown below camera

  /* ── palette (cycles) ─────────────────── */
  const PALETTES = [
    { top: '#4ade80', side: '#16a34a', shadow: '#14532d' },
    { top: '#34d399', side: '#059669', shadow: '#064e3b' },
    { top: '#6ee7b7', side: '#10b981', shadow: '#065f46' },
    { top: '#a7f3d0', side: '#34d399', shadow: '#059669' },
    { top: '#86efac', side: '#22c55e', shadow: '#15803d' },
  ];

  /* ── state ───────────────────────────── */
  let stack = [];          // [{x, w, y (logical index from 0)}]
  let moving = null;       // {x, w, dir, speed, palette}
  let cameraY = 0;         // smooth camera (px offset from bottom of canvas)
  let targetCameraY = 0;
  let score, best, perfects;
  let particles = [];
  let floatTexts = [];
  let frameCount;

  /* ── resize ──────────────────────────── */
  function resize() {
    W = canvas.width  = area.clientWidth;
    H = canvas.height = area.clientHeight;
  }

  /* ── coordinate helpers ──────────────── */
  // Logical block index → canvas Y (top of block), accounting for camera
  function blockTop(idx) {
    return H - (idx + 1) * BLOCK_H - cameraY;
  }

  /* ── spawn moving block ──────────────── */
  function spawnMoving() {
    const top    = stack[stack.length - 1];
    const w      = top.w;
    const pal    = PALETTES[stack.length % PALETTES.length];
    const speed  = Math.min(SPEED_MAX, SPEED_BASE + stack.length * 0.12);
    // start off-screen left or right alternately
    const dir    = stack.length % 2 === 0 ? 1 : -1;
    const startX = dir === 1 ? -w : W + w;
    moving = { x: startX, w, dir, speed, palette: pal };
  }

  /* ── place block ─────────────────────── */
  function placeBlock() {
    if (!moving || !running) return;

    const top = stack[stack.length - 1];
    const overlapLeft  = Math.max(moving.x, top.x);
    const overlapRight = Math.min(moving.x + moving.w, top.x + top.w);
    const overlap      = overlapRight - overlapLeft;

    if (overlap <= 0) {
      // Missed completely
      triggerGameOver();
      return;
    }

    const isPerfect = Math.abs(overlap - top.w) < PERFECT_TOL && overlap >= top.w - PERFECT_TOL;
    let newW = overlap;
    let newX = overlapLeft;

    if (isPerfect) {
      // Snap to perfect + restore width (up to original BASE_W)
      newW = Math.min(top.w + 4, BASE_W);
      newX = top.x + (top.w - newW) / 2;
      perfects++;
      perfectEl.textContent = perfects;
      triggerPerfectFlash();
      spawnFloatText(newX + newW / 2, blockTop(stack.length) - 20, '+PERFECT!', '#a7f3d0');
      score += 3;
    } else {
      // Spawn cut-off chunk
      const cutW = moving.w - overlap;
      const cutX = (overlapLeft === moving.x) ? moving.x + moving.w - cutW : moving.x;
      spawnCutChunk(cutX, cutW, stack.length, moving.palette);
      score += 1;
    }

    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('stackBest', best); }

    stack.push({ x: newX, w: newW, palette: moving.palette });

    // Camera follows
    const newTop = blockTop(stack.length - 1);
    if (newTop < H * 0.45) {
      targetCameraY = cameraY + H * 0.45 - newTop;
    }

    if (newW < MIN_W) {
      triggerGameOver();
      return;
    }

    moving = null;
    spawnMoving();
  }

  /* ── cut chunk particles ──────────────── */
  function spawnCutChunk(cx, cw, idx, pal) {
    const cy = blockTop(idx);
    const n  = Math.max(4, Math.floor(cw / 6));
    for (let i = 0; i < n; i++) {
      const px = cx + Math.random() * cw;
      const py = cy + Math.random() * BLOCK_H;
      particles.push({
        x: px, y: py,
        vx: (Math.random() - 0.5) * 3,
        vy: -(1 + Math.random() * 3),
        r: 3 + Math.random() * 4,
        color: pal.top,
        life: 1,
        gravity: 0.18,
      });
    }
  }

  function spawnFloatText(x, y, text, color) {
    floatTexts.push({ x, y, text, color, alpha: 1, vy: -1.2 });
  }

  /* ── perfect flash ────────────────────── */
  function triggerPerfectFlash() {
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 120);
  }

  /* ── game over ────────────────────────── */
  function triggerGameOver() {
    running = false;
    cancelAnimationFrame(raf);
    // small delay so player sees the miss
    setTimeout(() => {
      finalEl.textContent = score;
      overMsg.textContent = score >= best
        ? '🏆 New best score!'
        : `Best: ${best} — stack higher!`;
      scrOver.classList.remove('hidden');
    }, 600);
  }

  /* ── update ──────────────────────────── */
  function update() {
    frameCount++;

    // Smooth camera
    cameraY += (targetCameraY - cameraY) * 0.1;

    // Move sliding block
    if (moving) {
      moving.x += moving.dir * moving.speed;
      // Bounce off edges with block width
      if (moving.dir === 1 && moving.x + moving.w > W + moving.w * 0.6) {
        moving.dir = -1;
      } else if (moving.dir === -1 && moving.x < -moving.w * 0.6) {
        moving.dir = 1;
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += p.gravity;
      p.life -= 0.025;
      if (p.life <= 0 || p.y > H + 20) particles.splice(i, 1);
    }

    // Float texts
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const ft = floatTexts[i];
      ft.y += ft.vy; ft.alpha -= 0.02;
      if (ft.alpha <= 0) floatTexts.splice(i, 1);
    }
  }

  /* ── draw ────────────────────────────── */
  function drawBlock(x, w, topY, pal, accent) {
    if (w <= 0) return;
    const bh = BLOCK_H;
    const depth = 7; // 3-D side depth px

    // Shadow under block
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x + depth, topY + bh, w, 4);

    // Top face
    ctx.fillStyle = accent || pal.top;
    ctx.fillRect(x, topY, w, bh);

    // Right side face (3-D depth)
    ctx.fillStyle = pal.side;
    ctx.beginPath();
    ctx.moveTo(x + w,        topY);
    ctx.lineTo(x + w + depth, topY - depth);
    ctx.lineTo(x + w + depth, topY + bh - depth);
    ctx.lineTo(x + w,        topY + bh);
    ctx.closePath();
    ctx.fill();

    // Top face bevel (3-D)
    ctx.fillStyle = pal.top;
    ctx.beginPath();
    ctx.moveTo(x,          topY);
    ctx.lineTo(x + depth,  topY - depth);
    ctx.lineTo(x + w + depth, topY - depth);
    ctx.lineTo(x + w,      topY);
    ctx.closePath();
    ctx.fill();

    // Shine stripe
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.fillRect(x + 4, topY + 5, w - 8, 4);
    // Wood grain lines
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    for (let g = 14; g < w - 4; g += 18) {
      ctx.beginPath();
      ctx.moveTo(x + g, topY + 2);
      ctx.lineTo(x + g, topY + bh - 2);
      ctx.stroke();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0c1220');
    bg.addColorStop(1, '#0f1e12');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let s = 0; s < 40; s++) {
      const sx = (s * 137 + 11) % W;
      const sy = (s * 71  + 23) % (H * 0.7);
      ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI*2); ctx.fill();
    }

    // Draw stacked blocks (bottom to top)
    const firstVisible = Math.max(0, stack.length - Math.ceil(H / BLOCK_H) - VIEW_SLACK);
    for (let i = firstVisible; i < stack.length; i++) {
      const b   = stack[i];
      const top = blockTop(i);
      if (top > H + BLOCK_H) continue;
      // Height progress tint: lower = darker
      const progress = i / Math.max(1, stack.length - 1);
      const pal = b.palette;
      // Darken lower blocks
      drawBlock(b.x, b.w, top, pal, i === 0 ? '#1a3320' : null);
    }

    // Moving block
    if (moving) {
      const top = blockTop(stack.length);
      drawBlock(moving.x, moving.w, top, moving.palette);

      // Shadow on top of stack
      const topBlock = stack[stack.length - 1];
      const overlapL = Math.max(moving.x, topBlock.x);
      const overlapR = Math.min(moving.x + moving.w, topBlock.x + topBlock.w);
      if (overlapR > overlapL) {
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(overlapL, blockTop(stack.length - 1), overlapR - overlapL, BLOCK_H);
      }
    }

    // Particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    // Float texts
    floatTexts.forEach(ft => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, ft.alpha);
      ctx.fillStyle   = ft.color;
      ctx.shadowColor = ft.color;
      ctx.shadowBlur  = 10;
      ctx.font        = 'bold 15px Segoe UI';
      ctx.textAlign   = 'center';
      ctx.fillText(ft.text, ft.x, ft.y);
      ctx.restore();
    });

    // Height indicator – thin line at moving block level
    if (moving && running) {
      const ty = blockTop(stack.length);
      ctx.strokeStyle = 'rgba(52,211,153,0.15)';
      ctx.lineWidth   = 1;
      ctx.setLineDash([4, 8]);
      ctx.beginPath();
      ctx.moveTo(0, ty); ctx.lineTo(W, ty);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  /* ── game loop ────────────────────────── */
  function loop() {
    if (!running) return;
    update();
    draw();
    raf = requestAnimationFrame(loop);
  }

  /* ── start ───────────────────────────── */
  function startGame() {
    particles = []; floatTexts = [];
    score = 0; perfects = 0; frameCount = 0;
    cameraY = 0; targetCameraY = 0;
    scoreEl.textContent   = '0';
    perfectEl.textContent = '0';

    // Ground block
    const gx = (W - BASE_W) / 2;
    stack = [{ x: gx, w: BASE_W, palette: PALETTES[0] }];

    scrStart.classList.add('hidden');
    scrOver.classList.add('hidden');
    running = true;
    cancelAnimationFrame(raf);
    spawnMoving();
    loop();
  }

  /* ── input ───────────────────────────── */
  area.addEventListener('click',      placeBlock);
  area.addEventListener('touchstart', e => { e.preventDefault(); placeBlock(); }, { passive: false });
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowDown') { e.preventDefault(); placeBlock(); }
  });

  document.getElementById('btn-start').addEventListener('click',   e => { e.stopPropagation(); startGame(); });
  document.getElementById('btn-restart').addEventListener('click', e => { e.stopPropagation(); startGame(); });

  /* ── init ────────────────────────────── */
  best = parseInt(localStorage.getItem('stackBest') || '0');
  bestEl.textContent = best;

  window.addEventListener('resize', () => { resize(); });
  resize();

  // idle bg
  (function idle() {
    if (running) return;
    ctx.clearRect(0, 0, W, H);
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0c1220');
    bg.addColorStop(1, '#0f1e12');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    requestAnimationFrame(idle);
  })();
})();
</script>
</body>
</html>
